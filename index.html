{ id:'s3u2', icon:'🎰', color:'var(--blue)', title:'Deciding Under Uncertainty', sub:'Expected value, utility, and the worth of knowing',
  source:[['Book: How to Measure Anything (Hubbard) — VOI chapters','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'s3u2c1', icon:'💱', title:'Expected value, honest utility', kind:'learn',
teach:`<p><b>Expected value</b>: probability × payoff, summed over outcomes. The discipline is not the arithmetic — it is agreeing to take good bets <i>repeatedly</i> and let variance wash out, instead of re-litigating each loss as if the policy failed.</p>
<p>Two honest complications:</p>
<p>• <b>Utility, not euros.</b> Losing your last 1000€ hurts more than winning 1000€ helps. Risk aversion about LARGE fractions of your resources is not irrational — it falls straight out of utility curvature. (The Kelly-flavored rule of thumb: never bet a big fraction of your bankroll on one roll, even at good odds.)<br>• <b>Small repeated bets are where EV shines.</b> Asking the question at the meeting, sending the cold email, the 5-minute Resolve Cycle on a probably-unfixable bug: tiny costs, fat right tails, run the policy.</p>
<div class="key">The failure mode this chapter hunts: treating one bad outcome of a good bet as proof the bet was wrong. Judge policies by their distribution, not draws by their outcome — you already learned the emotional half of this in Sunk Cost Faith.</div>`,
quiz:[
{q:'You took a well-calculated 70% bet and lost. What does this prove about the decision?',opts:[
['It was the wrong decision',0,'Outcome bias. A 70% bet loses 30% of the time BY DESIGN. The decision is judged by the numbers available when it was made.'],
['Nothing by itself — 30% losses are part of a correct 70% policy; judge the policy over draws',1,'Right. Update your probability estimates if the loss carries new information, but a loss alone does not indict the bet.'],
['That you should be more risk-averse',0,'Only if the stake was a large fraction of your resources — that is a utility-curvature question, separate from one loss stinging.']]},
{q:'When is refusing a positive-EV bet rational?',opts:[
['Never — EV is the whole story',0,'EV in raw money ignores utility curvature. Losing what you cannot afford to lose is not offset by symmetric gains.'],
['When the stake is a large fraction of your resources — utility curvature makes the loss weigh more than the gain',1,'Exactly. Risk aversion at bankroll scale is math, not cowardice. At small scale, though, take the good bets and let variance wash.'],
['Whenever losing would feel bad',0,'Feeling bad about small losses is variance-flinching — the thing the repeated-bets discipline exists to override.']]}],
cards:[
['Judge policies, not draws','A 70% bet losing proves nothing by itself — 30% losses are part of the design. Outcome bias = re-litigating good bets after bad draws.'],
['When is risk aversion rational?','At bankroll scale: utility curvature makes losing a large fraction of resources weigh more than winning it. At small repeated-bet scale: take the +EV bets and let variance wash out.']],
},

{ id:'s3u2c2', icon:'🔎', title:'Value of information', kind:'drill',
teach:`<p>Before researching a decision, price the research: <b>information only has value if it could change what you do.</b></p>
<p>The 3-question VOI estimate: (1) What would I do by default? (2) What could the research realistically show that would FLIP that choice — and how likely is that? (3) How much better is the flipped choice in that world? Multiply (2)×(3): that is roughly what the research is worth. Compare with its cost in hours.</p>
<div class="ex"><b>Example:</b> Choosing between two €40 gadgets, 3 hours of review-reading, flip probability maybe 30%, gain-if-flipped maybe €15 of satisfaction → VOI ≈ €4.50 for 3 hours. Meanwhile a job decision with a 10% flip probability worth thousands justifies WEEKS of due diligence. Most people invert this allocation exactly.</div>`,
drill:{prompt:`Price the information on a real pending decision. Report: (a) the decision + default choice, (b) what could realistically flip it + flip probability, (c) value of the flip in that world, (d) VOI ≈ (b)×(c) vs the research cost, (e) verdict: decide now, or research a specific bounded thing.`,
placeholder:'Decision: ... default: ...\nFlip if: ... (p≈...)\nFlip worth: ...\nVOI ≈ ... vs cost ≈ ...h\nVerdict: ...',min:8},
rubric:['Decision is real and pending','Flip scenario is specific and its probability estimated honestly','VOI multiplication actually done, units sane','Verdict follows the numbers — including "decide now" when VOI is small','If researching: the research is bounded (what, how long)'],
cards:[
['Value of information — 3 questions','1) Default choice? 2) What could flip it + how likely? 3) How much better is the flipped choice? VOI ≈ p(flip)×value(flip). Compare with research cost.'],
['The classic VOI inversion','Weeks of review-reading on cheap reversible choices; snap decisions on huge irreversible ones. Research effort should scale with stakes × flippability.']],
},

{ id:'s3u2c3', icon:'🧮', title:'The ten-minute decision analysis', kind:'drill',
teach:`<p>Full pipeline on one real decision, timeboxed to ~10 minutes — long enough to structure, short enough to actually happen:</p>
<p>1. Options (include the do-nothing and the weird third option).<br>2. The 1-2 uncertainties that actually drive the choice.<br>3. Rough probabilities and payoffs → rough EV per option.<br>4. <b>Inner-sim cross-check</b> (Section 1, Unit 8): imagine each option chosen — where does the gut resist the spreadsheet? A mismatch means a hidden variable, usually an unpriced cost. Find it, re-run.<br>5. Decide, or name the ONE bounded piece of information you need first (previous chapter).</p>
<div class="key">The math and the simulator are colleagues, not rivals: the spreadsheet catches scope neglect, the gut catches missing variables. Agreement between them is what license-to-act feels like.</div>`,
drill:{prompt:`Run the 10-minute analysis on a real decision (timer below). Report: options, driving uncertainties with rough probabilities, EV sketch, the inner-sim cross-check (where gut and math disagreed and what hidden variable it exposed), and your decision or the single bounded info-need.`,
placeholder:'Decision: ...\nOptions: A / B / C(weird)\nDriving uncertainty: ... p≈...\nEV sketch: ...\nGut check: resisted ... → hidden variable: ...\nDecision: ...',min:10,timer:10},
rubric:['Real decision, analysis actually timeboxed','A weird third option was generated','EV sketch uses explicit rough numbers','Inner-sim cross-check performed; any mismatch investigated for the hidden variable','Ends in a decision or ONE bounded info-need, not "more thought needed"'],
cards:[
['Spreadsheet + simulator division of labor','EV math catches scope neglect (numbers the gut can’t feel); the inner sim catches hidden variables (costs the spreadsheet didn’t price). Agreement = license to act.']],
},
]},

{ id:'s3u3', icon:'🎳', color:'var(--purple)', title:'Decision Theory for Humans', sub:'Newcomb is everywhere people model you',
  source:[['Planecrash / Project Lawful (Yudkowsky & lintamande) — further reading','https://www.projectlawful.com/'],['LW: Functional Decision Theory','https://www.lesswrong.com/w/functional-decision-theory']],
  chapters:[

{ id:'s3u3c1', icon:'📦', title:'Newcomb in your life', kind:'learn',
teach:`<p>Newcomb’s problem — a predictor fills boxes based on what it predicts you’ll choose — sounds like philosophy-department exotica. It stops being exotic the moment you notice: <b>everyone around you is a predictor.</b> Imperfect, but good enough that their model of you fills boxes daily: trust extended or withheld, opportunities offered or not, honesty reciprocated or not — decided before you act, based on the kind of agent they model you as.</p>
<p>Plain-language decision theories: <b>CDT</b> asks "what does this act cause, from here?" — and two-boxes, defects, and cannot keep a promise once keeping stops paying. <b>FDT</b>-flavored reasoning asks "what POLICY, if I were known to run it, serves me best?" — and keeps promises, pays back favors nobody could enforce, and one-boxes.</p>
<div class="key">You met this in Section 1 as TDT-for-humans (self-trust). The upgrade: the same logic runs on OTHER minds. People deal with their model of you; you choose what that model observes. Being reliably honest is not a sacrifice CDT should talk you out of — it is what fills your boxes.</div>
<p>Further reading, gloriously long-form: Planecrash (link above) dramatizes an agent who takes decision theory as seriously as physics.</p>`,
quiz:[
{q:'Why does Newcomb-like structure appear in ordinary social life?',opts:[
['It does not — Newcomb needs a perfect predictor',0,'Perfection is not required; correlation is. A colleague who models you 70% accurately still fills boxes (trust, offers, candor) based on that model before you act.'],
['Because people act on their MODEL of you, formed before your choice — so your standing policy, not your in-the-moment act, is what gets rewarded',1,'Exactly. The predictor is everyone who knows you. You choose your policy; their observations of it fill your boxes.'],
['Because people are irrational',0,'Modeling others and acting on the model is highly functional — it is the rational behavior that CREATES the Newcomblike payoff structure.']]}],
cards:[
['CDT vs FDT, one line each','CDT: "what does this act cause from here?" (defects, breaks unenforceable promises). FDT-flavored: "what policy, known to be mine, serves me best?" (keeps promises, one-boxes).'],
['Why is social life Newcomblike?','People act on their pre-formed model of you — trust, offers, candor get decided before your act. Your standing policy is what fills the boxes, so choose policies, then be seen running them.']],
},

{ id:'s3u3c2', icon:'⛓️', title:'Precommitment and bright lines', kind:'learn',
teach:`<p>If policies beat acts, the practical art is <b>binding yourself to policies</b> when you’re strong, for moments when you’ll be weak. Ulysses did not out-argue the sirens; he arranged the mast in advance.</p>
<p>The toolkit:</p>
<p>• <b>Bright lines</b>: rules with zero-judgment boundaries ("no spending decisions after 22h", "never two skipped sessions in a row"). Fuzzy rules get negotiated by tired-you; bright lines don’t convene the meeting.<br>• <b>Schelling fences</b>: place the line where there is a natural landmark, well BEFORE the cliff — because each small step past it re-anchors what feels normal (the slippery slope is real, and it slides by renegotiation).<br>• <b>Pre-signed exceptions</b>: a policy with principled escape hatches written in advance ("unless someone is blocked on me") survives contact with reality; improvising exceptions in the moment is just CDT sneaking back in.</p>
<div class="key">Connect to your TAP audits: a TAP is a micro-precommitment, and every audit is you checking whether past-you’s treaties are being honored. Same machinery, now with a theory underneath.</div>`,
quiz:[
{q:'Why do bright lines outperform fuzzy "reasonable judgment" rules?',opts:[
['Because judgment is always bad',0,'Judgment is fine when you are at full strength. Bright lines exist precisely for the moments when you are not.'],
['Because fuzzy rules get renegotiated by the tired/tempted version of you — bright lines never convene that meeting',1,'Right. "One episode if I truly need rest" invites nightly litigation; "no screens after 23h" adjourns the court permanently.'],
['Because they impress other people',0,'Occasionally a side effect (reputation IS Newcomblike), but the primary customer is future-you.']]}],
cards:[
['Bright line — why it works','Zero-judgment boundary ("no X after 22h"): the tired/tempted self never gets a negotiation to win. Fuzzy rules die by nightly renegotiation.'],
['Schelling fence','Place your line at a natural landmark well before the cliff — each small step past a line re-anchors normal, so defend the fence, not the cliff edge.'],
['Pre-signed exceptions','Write principled escape hatches into the policy in advance ("unless someone is blocked on me"). Improvised in-the-moment exceptions are the policy dying politely.']],
},

{ id:'s3u3c3', icon:'🤝', title:'Find your Newcomb', kind:'drill',
teach:`<p>Locate one live Newcomblike structure in your own life — somewhere an agent (boss, partner, client, community, or future-you) is filling boxes based on their model of your policy — and set the policy deliberately.</p>`,
drill:{prompt:`Report: (a) the situation and WHO the predictor is, (b) what boxes their model of you fills (what gets extended or withheld before you act), (c) the policy a naive act-by-act CDT view would suggest, (d) the policy you actually choose FDT-style, with its bright line and pre-signed exceptions, (e) how the predictor will get to OBSERVE the policy (unobserved virtue fills no boxes).`,
placeholder:'Situation: ... predictor: ...\nTheir model fills: ...\nCDT would say: ...\nMy policy: ... bright line: ... exceptions: ...\nObservable via: ...',min:10},
rubric:['A real predictor-structure identified, not a generic virtue pledge','The boxes (what is pre-decided about you) named concretely','CDT-vs-policy contrast is genuine — the policy costs something act-by-act','Bright line + pre-signed exceptions specified','Observability channel identified — the policy is visible to the predictor'],
cards:[],
},
]},
];

{ id:'s4u2', icon:'🧪', color:'var(--teal)', title:'Self-Experiments', sub:'n=1 without fooling yourself',
  source:[['Book: How to Measure Anything (Hubbard)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'s4u2c1', icon:'⚗️', title:'The n=1 rulebook', kind:'learn',
teach:`<p>Your life is full of testable claims — caffeine timing, exercise vs mood, meeting-free mornings — and n=1 experiments can actually answer them IF you dodge four classic self-deceptions:</p>
<p>1. <b>No baseline, no experiment.</b> Measure ≥1 week BEFORE changing anything. Otherwise "it works" means "I started paying attention".<br>2. <b>One variable.</b> The enthusiasm that starts an experiment loves changing five things; then nothing is learned no matter the result.<br>3. <b>Pre-register metric, duration, and success bar</b> — decided before, or hindsight will pick whichever metric flattered the hypothesis.<br>4. <b>Expect regression to the mean.</b> You start experiments when things are unusually bad; things then return toward normal on their own, and the intervention takes credit.</p>
<div class="key">Placebo caveat, honestly handled: at n=1 you mostly cannot blind yourself. If an effect is placebo but PERSISTS for months at near-zero cost — often fine, take it. The rulebook’s real job is protecting you from expensive or identity-level conclusions drawn from noise.</div>`,
quiz:[
{q:'You start a mood experiment during your worst week of the quarter. It "works". The most likely explanation?',opts:[
['The intervention works',0,'Maybe! But you chose the start time precisely because things were unusually bad — and unusually bad reverts toward normal by itself.'],
['Regression to the mean: bad extremes drift back toward baseline regardless of intervention',1,'Right — the single most common n=1 illusion. Defense: a real pre-baseline, and ideally an on/off/on repetition.'],
['Placebo',0,'Possible too, but the start-at-the-bottom design error is the bigger and more systematic culprit here.']]},
{q:'Why must the metric and success bar be fixed BEFORE the experiment?',opts:[
['To make it feel official',0,'Ceremony is not the function. The function is removing a degree of freedom that hindsight always abuses.'],
['Because afterwards, hindsight will pick whichever of the twenty possible metrics flattered the hypothesis',1,'Exactly — with enough post-hoc metric choices, everything "works". Pre-registration is the n=1 version of not grading your own exam after seeing the answers.'],
['Because metrics cannot be measured retroactively',0,'Some can — the problem is selection among them, not availability.']]}],
cards:[
['The n=1 rulebook (4 rules)','1) Baseline ≥1 week before changing anything. 2) One variable. 3) Pre-register metric, duration, success bar. 4) Expect regression to the mean (you start experiments at your worst).'],
['The honest placebo policy','Can’t blind yourself at n=1. A placebo effect that persists at near-zero cost is often worth keeping — the rulebook protects against EXPENSIVE conclusions from noise, not against cheap wins.']],
},

{ id:'s4u3', icon:'📏', color:'var(--gold)', title:'Measure What Matters', sub:'Hubbard, Goodhart, and honest metrics',
  source:[['Book: How to Measure Anything (Hubbard)','https://www.rationality.org/resources/reading-list'],['LW: Goodhart Taxonomy','https://www.lesswrong.com/posts/EbFABnst8LsidYs5Y/goodhart-taxonomy']],
  chapters:[

{ id:'s4u3c1', icon:'🌫️', title:'Measurement dissolves fog', kind:'learn',
teach:`<p>Douglas Hubbard’s heresy: <b>anything that matters is measurable</b>, because "measurable" only means <i>reducing uncertainty</i>, not achieving precision. "Team morale", "writing quality", "am I improving at rationality" — all fog until you ask his three questions:</p>
<p>1. <b>What decision would this measurement change?</b> (No decision → don’t measure; you’re decorating.)<br>2. <b>What do you observe when the thing is present vs absent?</b> Fog words hide observables: "morale" contains sick days, volunteering rates, how long people linger after meetings.<br>3. <b>How much uncertainty reduction does the decision need?</b> Often a 90%-confidence RANGE from five data points is plenty — you needed to know "closer to 2 or to 20", not the third decimal.</p>
<div class="key">Then Goodhart arrives: <b>when a measure becomes a target, it stops measuring.</b> The proxy gets optimized, the target drifts away — page counts produce padding, step counts produce wrist-shaking. Every metric you install needs a plan for its own corruption.</div>`,
quiz:[
{q:'Hubbard’s first question before measuring anything is:',opts:[
['What instrument is most precise?',0,'Precision comes last, if at all. Measurement is uncertainty reduction in service of something — and that something comes first.'],
['What decision would this measurement change?',1,'Right — no decision downstream means the measurement is decoration. This one question deletes half of most dashboards.'],
['Can it be expressed as a number?',0,'Almost anything can, which is why this filter filters nothing.']]},
{q:'Your daily word-count target has you padding sentences by Thursday. This is:',opts:[
['Evidence you need a higher target',0,'A higher target buys more padding. The proxy is corrupted, not under-dosed.'],
['Goodhart in action: the proxy (words) became the target and detached from the goal (writing worth reading)',1,'Exactly. Standard fixes: pair the proxy with a counter-metric (editor-surviving words), rotate proxies, or audit samples against the true goal.'],
['Proof that writing cannot be measured',0,'It is proof that ONE proxy corrupts under pressure — Hubbard’s observables are plural for exactly this reason.']]}],
cards:[
['Hubbard’s 3 questions','1) What decision would this change? (none → don’t measure). 2) What do you observe when it’s present vs absent? 3) How much uncertainty reduction does the decision actually need?'],
['"Measurable" redefined','Measurement = uncertainty reduction, not precision. A 90%-confidence range from five observations often suffices — you needed "2 or 20?", not decimals.'],
['Goodhart’s law + the standard defenses','When a measure becomes a target it stops measuring. Defenses: pair proxy with a counter-metric, rotate proxies, periodically audit samples against the true goal.']],
},

{ id:'s4u3c2', icon:'🛡️', title:'One Goodhart-resistant metric', kind:'drill',
teach:`<p>Instrument one personal goal you currently track by vibes. Build the metric Hubbard-first (decision, observables, needed precision), then Goodhart-proof it: name how YOU would game it within a month, and install the counter-metric that catches that gaming.</p>`,

},
]},

{ id:'s5u1c1', icon:'🪜', title:'Meta is a tax', kind:'learn',
teach:`<p>The Object-Level attitude’s uncomfortable claim, given its own section: <b>every hour spent improving your thinking is an hour not spent using it.</b> Meta-work compounds — but only if there is an object level for it to compound INTO. A perfectly sharpened axe in a shed cuts nothing.</p>
<p>The failure mode has a signature you can learn to feel: meta-work is <i>legible, controllable, and safe</i>. The bug list always offers one more bug; the technique always has a refinement. Real projects can FAIL — and so the toolbox becomes the world’s most productive hiding place.</p>
<div class="key">This section inverts the app’s frame. Your Hamming chapter produced the most important problem in your life. Here, that problem (or the project attacking it) becomes THE project — and rationality practice becomes its support crew: capped, triggered by need, evaluated by what ships.</div>
<p>Test yourself now: in the last month, what changed in the WORLD — not in your systems, your notes, or your understanding — because of your practice?</p>`,
quiz:[
{q:'Why does meta-work make such an effective hiding place?',opts:[
['Because it is useless',0,'It is genuinely useful — that is what makes the hiding place respectable. Useless procrastination at least announces itself.'],

['Because tools are fun',0,'Fun is fine. The trap is structural: safety plus endless supply, not enjoyment.']]}],
cards:[
['Meta is a tax — the test','In the last month, what changed in the WORLD (not your systems/notes/understanding) because of your practice? Meta-hours rising while world-changes flatline = the hiding place.'],

{ id:'s5u1c2', icon:'📜', title:'Charter and first ship', kind:'drill',
teach:`<p>Charter THE project — the one your Hamming answer points at, or the nearest actionable proxy for it. The charter is one page and one commitment:</p>
<p>• <b>Outcome</b>: what exists in the world if this works (goal-factored — check the outcome is YOURS, Unit 6 style).<br>• <b>Weekly ship</b>: the unit of visible progress you commit to producing every week — small enough to survive bad weeks, real enough that someone could see it.<br>• <b>First ship within 48 hours</b>: something leaves your hands — an email sent, a page published, a prototype shown. Not prepared: <i>shipped</i>.</p>

{ id:'s5u2', icon:'🚢', color:'var(--blue)', title:'Cadence', sub:'Ship weekly, budget the meta',

{ id:'s5u2c1', icon:'⚓', title:'Deep hours by design', kind:'learn',
teach:`<p>The weekly ship gets built in <b>deep hours</b> — and deep hours are not found, they are <i>manufactured</i>, with tools you already own:</p>
<p>• <b>Design (Unit 5):</b> a standing time block defended by environment — phone in another room, one tab, the work already open from yesterday (ending mid-sentence is a gift to tomorrow-you).<br>• <b>TAPs:</b> "When I sit at the cleared desk at 9:00 → open the project file and read the last paragraph." Entry into deep work is a trigger problem, not a motivation problem.<br>• <b>Inner Game (Section 2):</b> non-judgmental awareness during the block — noting "distraction arose" beats the Self-1 lecture about discipline that costs three more minutes.</p>
<div class="key">Definition of shipped, decided now, per week: visible outside your head, dated, and small. "Chapter drafted and sent to one reader" ships; "worked on the chapter" is fog. The next chapter installs the weekly check-in that will ask exactly one question: what shipped?</div>`,
quiz:[
{q:'"Ending mid-sentence is a gift to tomorrow-you" works because:',opts:[
['Unfinished work creates guilt that motivates',0,'Guilt is a terrible fuel (Section 1, Understanding Shoulds). The mechanism is friction, not feelings.'],
['It removes the entry friction of a cold start — tomorrow’s TAP lands on an open loop with an obvious next keystroke',1,'Right. The hardest moment of deep work is entry; a visible next action collapses it. Same 20-second rule as the gym bag by the door.'],
['It ensures you remember the idea',0,'Notes do that. The mid-sentence trick is about tomorrow’s ENTRY cost, not memory.']]}],
cards:[
['Deep hours are manufactured, not found','Standing block + environment design (phone exiled, one tab) + entry TAP ("sit at cleared desk → read last paragraph") + mid-sentence endings to kill cold starts.'],

{ id:'s5u2c2', icon:'📦', title:'The shipping log', kind:'checkin',

{ id:'s5u2c3', icon:'⏲️', title:'The meta-budget', kind:'learn',
teach:`<p>The chapter where the app argues against itself, sincerely: <b>cap your rationality practice.</b> A practical Object-Level budget: ~15 minutes on ordinary days (reviews, one check-in, one rep), with deep meta-work (new chapters, big IDC sessions, curriculum binges) <b>earned by shipping</b> — meta as celebration, not avoidance.</p>
<p>The daily new-lesson cap in this app (see ⚙️) is this chapter, enforced by software. Two new chapters a day is plenty; the ledger of due reps and habits is where skill actually accretes.</p>
<div class="key">The diagnostic that keeps the budget honest: before opening any rationality tool, ask <i>"what object-level thing am I possibly avoiding right now?"</i> Sometimes the answer is "nothing, it’s practice time" — fine. When it isn’t, you just caught the hiding place mid-use, which is Section 1 noticing doing its highest-value work.</div>`,

cards:[
['The meta-budget','~15 min/day of practice on ordinary days; deep meta-work is EARNED by shipping (celebration, not avoidance). The app’s new-lesson cap enforces the intake side.'],

{ id:'s5u3c2', icon:'🔔', title:'Trigger-based meta', kind:'learn',
teach:`<p>Graduation policy for the Object-Level attitude: <b>meta-work by trigger, not by schedule</b> (the small daily budget aside). The triggers, with their assigned tools:</p>
<p>• <b>Stuck ≥2 days on the same point</b> → Murphyjitsu the plan; if the plan is fine, Hamming-question the project.<br>• <b>Two "nothing shipped" weeks</b> → aversion-factor the project itself: which part produces the flinch? Real cost or miscalibrated fear?<br>• <b>Recurring friction (3+ appearances in the log)</b> → one Design fix, then back to work.<br>• <b>A decision worth &gt;1 week of work</b> → the 10-minute decision analysis, once, with the inner-sim cross-check.<br>• <b>Emotional weather around the project</b> (dread, staleness, resentment) → one Focusing session; the felt sense knows whether this is a rough patch or a wrong project.</p>
<div class="key">Everything else — the itch to reorganize, re-plan, re-read, refine — waits for the daily budget or dies. The dojo exists so you can fight; the fight is out there. Go ship.</div>`,
quiz:[
{q:'You feel a strong urge to redesign your task system mid-afternoon. Per trigger-based meta:',opts:[

['Suppress all system thoughts forever',0,'The budget and triggers exist precisely so meta-work has a legitimate place — bounded, not banished.']]}],
cards:[
['The five meta-triggers','Stuck ≥2 days → Murphyjitsu/Hamming. Two shipless weeks → aversion-factor the project. 3× recurring friction → one Design fix. Decision >1 week of work → 10-min analysis. Emotional weather → Focusing.'],
['Trigger-based meta — the policy','Outside the small daily budget, meta-work runs only when a trigger fires. Mid-work urges to reorganize/re-plan match no trigger — they match the hiding place.']],
},
]},

{ id:'s6u1', icon:'📚', color:'var(--purple)', title:'Reading With Reps', sub:'The Reading attitude, made honest',

{ id:'s6u1c1', icon:'🥩', title:'Reading is not practice — unless', kind:'learn',
teach:`<p>The Reading attitude is right that the corpus matters: the Sequences and the reading list contain distinctions you will not reinvent (you have now met a dozen of them in this app). It goes wrong only at the exchange rate — insight-feelings are not skills, and highlighting is not installing.</p>
<p>The honest protocol, per reading session:</p>
<p>1. <b>Extract 1-3 cards</b> in your own words — if you cannot write the card without the book open, you have not read it yet.<br>2. <b>Design one rep</b>: a concrete application of the idea to YOUR life within 48 hours. No rep derivable → the reading was entertainment (permitted! just not creditable as practice).<br>3. <b>File the disagreements</b>: where the author seems wrong, write the crux — that is where your own thinking starts, and Section 6 is about your own thinking.</p>
<div class="key">Exchange rate to internalize: one post genuinely repped beats ten posts admired. The Canon read this way takes years — and unlike the fast way, it compounds.</div>`,
quiz:[
{q:'The test for whether you have actually read a post, per this protocol:',opts:[
['You remember agreeing with it',0,'Agreement-feelings fade in days and were never skills. The test is productive: what can you now DO?'],
['You can write its core distinction as a card in your own words, and derive one 48-hour rep from it',1,'Right — own-words extraction plus a derivable application. Fail either and the reading was (permitted) entertainment.'],
['You highlighted the key passages',0,'Highlighting is the reading-attitude equivalent of buying gym clothes.']]}],
cards:[
['The reading protocol','Per session: 1) extract 1-3 cards in YOUR words (book closed), 2) design one rep applying it to your life within 48h, 3) file disagreements as cruxes. No derivable rep = entertainment, not practice.'],

{ id:'s6u3c1', icon:'📕', title:'Handbook v0.1', kind:'drill',

{ id:'s6u3c2', icon:'🛠️', title:'The editor: extend this app', kind:'learn',
teach:`<p>Final chapter, and the app changes hands. In the <b>My Art</b> section (new chip on your path), you can now author your own chapters: a technique of your invention (Section 1’s Final Exam produced your first), with its own teaching notes, drill prompt, grading rubric, flashcards — and optionally its own recurring check-in.</p>

// ===================== PRAXIS ENGINE =====================
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const DAY=864e5, HOUR=36e5;
const todayStr=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,10);

// ---------- state ----------
let S=null;
const DEFAULT={v:1,xp:0,xpToday:0,today:todayStr(),streak:0,bestStreak:0,lastGoalDay:null,freezes:1,
goal:30,done:{},cards:{},bugs:[],taps:[],habits:{},preds:[],calib:[],calibSeen:[],
reports:[],apiKey:'',model:'claude-sonnet-4-6',notif:false,notified:{},welcomed:false,
ghToken:'',gistId:'',gistOwner:'',lastSync:0,updated:0,reps:{},sec:'s1',custom:[],cap:2,newDay:'',newCount:0,capOver:''};
function load(){try{S=Object.assign({},DEFAULT,JSON.parse(localStorage.getItem('praxis')||'{}'));}catch(e){S=Object.assign({},DEFAULT);}}
function save(){S.updated=Date.now();localStorage.setItem('praxis',JSON.stringify(S));scheduleSync();}

// ---------- gist sync ----------
const SYNC_PRIVATE=['apiKey','ghToken','gistId','gistOwner','notif','notified','lastSync'];
const GIST_FILE='praxis-sync.json';
let syncT=null, syncBusy=false;
function ghH(){return {'authorization':'Bearer '+S.ghToken,'accept':'application/vnd.github+json','content-type':'application/json'};}
function setSyncStatus(msg){const el=$('#syncstatus');if(el)el.innerHTML='<div class="small" style="margin-top:8px">'+msg+'</div>';}
function syncPayload(){const o={};for(const k in S){if(!SYNC_PRIVATE.includes(k))o[k]=S[k];}return JSON.stringify(o);}
function statusPayload(){ // non-sensitive numbers only: read by the notifier task & widget
  return JSON.stringify({day:S.today,xpToday:S.xpToday,goal:S.goal,goalMet:S.xpToday>=S.goal,
    streak:S.streak,freezes:S.freezes,dueHabits:dueHabits().length,dueReps:dueReps().length,
    dueCards:dueCards().length,openPreds:openPreds().length,updated:Date.now()});
}
function statusURL(){return (S.gistOwner&&S.gistId)?'https://gist.githubusercontent.com/'+S.gistOwner+'/'+S.gistId+'/raw/praxis-status.json':'';}
function scheduleSync(){if(!S.ghToken||!S.gistId)return;clearTimeout(syncT);syncT=setTimeout(syncPush,8000);}
async function syncPush(){
  if(!S.ghToken||!S.gistId||syncBusy)return; syncBusy=true;
  try{
    const r=await fetch('https://api.github.com/gists/'+S.gistId,{method:'PATCH',headers:ghH(),
      body:JSON.stringify({files:{[GIST_FILE]:{content:syncPayload()},'praxis-status.json':{content:statusPayload()}}})});
    if(r.ok){S.lastSync=Date.now();localStorage.setItem('praxis',JSON.stringify(S));setSyncStatus('☁️ ✓ pushed '+new Date().toLocaleTimeString());}
    else if(r.status===401||r.status===403)setSyncStatus('☁️ ✗ push failed: token invalid/expired (re-enable sync)');
    else if(r.status===404)setSyncStatus('☁️ ✗ gist not found — tap “Enable / repair sync”');
    else setSyncStatus('☁️ ✗ push failed: HTTP '+r.status);
  }catch(e){setSyncStatus('☁️ push skipped (offline) — will retry on next activity');}
  finally{syncBusy=false;}
}
async function syncPull(manual){
  if(!S.ghToken||!S.gistId)return;
  try{
    const r=await fetch('https://api.github.com/gists/'+S.gistId,{headers:ghH()});
    if(!r.ok){if(manual)setSyncStatus('☁️ ✗ pull failed: HTTP '+r.status);return;}
    const j=await r.json(); if(!S.gistOwner&&j.owner&&j.owner.login){S.gistOwner=j.owner.login;localStorage.setItem('praxis',JSON.stringify(S));}
    const f=j.files&&j.files[GIST_FILE]; if(!f)return;
    let txt=f.content;
    if(f.truncated){txt=await(await fetch(f.raw_url)).text();}
    const rem=JSON.parse(txt);
    if((rem.updated||0)>(S.updated||0)){
      SYNC_PRIVATE.forEach(k=>{rem[k]=S[k];});
      S=Object.assign({},DEFAULT,rem);
      S.lastSync=Date.now();
      localStorage.setItem('praxis',JSON.stringify(S));
      rebuild();
      toast('☁️ Newer progress pulled from sync');
      render();
    }else if(manual)setSyncStatus('☁️ ✓ this device is already up to date');
  }catch(e){if(manual)setSyncStatus('☁️ ✗ pull failed: '+esc(e.message));}
}
async function syncNow(){setSyncStatus('<span class="spin"></span> syncing…');await syncPull(true);await syncPush();}
async function syncEnable(){
  const t=$('#ghtok').value.replace(/[\s​-‍⁠﻿]/g,'');
  if(!t){setSyncStatus('☁️ ✗ paste a GitHub token first');return;}
  S.ghToken=t; localStorage.setItem('praxis',JSON.stringify(S));
  setSyncStatus('<span class="spin"></span> looking for your sync gist…');
  try{
    let id=null;
    const r=await fetch('https://api.github.com/gists?per_page=100',{headers:ghH()});
    if(r.status===401){setSyncStatus('☁️ ✗ token rejected (401). Use a classic token with the “gist” scope, or a fine-grained token with Gists read/write.');return;}
    let owner='';
    if(r.ok){const list=await r.json();const hit=list.find(g=>g.files&&g.files[GIST_FILE]);if(hit){id=hit.id;owner=(hit.owner&&hit.owner.login)||'';}}
    if(id){
      S.gistId=id; S.gistOwner=owner; localStorage.setItem('praxis',JSON.stringify(S));
      setSyncStatus('☁️ found existing sync gist — pulling…');
      await syncPull(true); await syncPush();
      setSyncStatus('☁️ ✓ sync enabled (existing gist '+id.slice(0,8)+'…). Pull happens on open, push after activity.');
    }else{
      const c=await fetch('https://api.github.com/gists',{method:'POST',headers:ghH(),
        body:JSON.stringify({description:'Praxis (applied rationality app) progress sync',public:false,
          files:{[GIST_FILE]:{content:syncPayload()},'praxis-status.json':{content:statusPayload()}}})});
      if(!c.ok){setSyncStatus('☁️ ✗ could not create gist: HTTP '+c.status+'. Check the token has gist write access.');return;}

// ---------- day rollover & streak ----------
function rollover(){
  const t=todayStr();
  if(S.today===t) return;
  // count days fully missed between lastGoalDay and yesterday
  const yesterday=new Date(Date.now()-DAY).toISOString().slice(0,10);
  if(S.streak>0 && S.lastGoalDay && S.lastGoalDay<yesterday){
    // days missed = gap between lastGoalDay and today, minus 1 grace for "today not over"
    let d=new Date(S.lastGoalDay+'T12:00:00');
    let missed=0;
    while(true){d=new Date(d.getTime()+DAY); const ds=d.toISOString().slice(0,10); if(ds>=t)break; missed++;}
    while(missed>0&&S.freezes>0){S.freezes--;missed--;toast('🧊 Streak freeze used');}
    if(missed>0){S.streak=0;}
  }
  S.today=t; S.xpToday=0; save();
}
function addXP(n){
  S.xp+=n; const before=S.xpToday; S.xpToday+=n;
  if(before<S.goal&&S.xpToday>=S.goal){ // daily goal hit -> streak
    if(S.lastGoalDay!==S.today){
      S.streak++; S.lastGoalDay=S.today;
      if(S.streak>S.bestStreak)S.bestStreak=S.streak;
      if(S.streak>0&&S.streak%7===0&&S.freezes<3){S.freezes++;toast('🧊 +1 streak freeze (7-day streak)');}
      setTimeout(()=>toast('🔥 Daily goal reached — streak '+S.streak),700);
    }
  }
  save(); renderTop();
  toast('+'+n+' XP');
}

async function claudeFeedback(chap,exercise,rubric,answer,extra){
  const sys='You are the precise, warm practice coach inside Praxis, a deliberate-practice app for applied rationality (CFAR Handbook / Hammertime curriculum). Your feedback style: specific, concrete, kind, zero fluff. The user practices on REAL life material; if the response looks hypothetical, generic, or fabricated where real material was required, say so plainly and ask for a real attempt. Never invent facts about the user.';
  const usr='CHAPTER: '+chap.title+' (unit: '+chap._unit.title+')\n\nEXERCISE:\n'+exercise.replace(/<[^>]+>/g,'')+
    '\n\nRUBRIC:\n'+(rubric||[]).map((r,i)=>(i+1)+'. '+r).join('\n')+
    (extra?'\n\nCONTEXT:\n'+extra:'')+
    '\n\nUSER RESPONSE:\n'+answer+
    '\n\nGive feedback in under 220 words:\n1) Rubric verdicts: for each item, ✓ / ✗ / ~ with a 1-line reason.\n2) GOOD: the strongest specific thing they did.\n3) SHARPEN: the single most important improvement.\n4) NEXT: one concrete follow-up action or probing question.';
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':S.apiKey,
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:S.model||'claude-sonnet-4-6',max_tokens:800,system:sys,
      messages:[{role:'user',content:usr}]})});
  if(!r.ok){const e=await r.text();throw new Error('API '+r.status+': '+e.slice(0,200));}
  const j=await r.json();
  return j.content.map(b=>b.text||'').join('');
}

function saveKey(){
  // strip whitespace, newlines, zero-width & other invisible characters that sneak in via copy-paste
  const k=$('#apikey').value.replace(/[\s\u200B-\u200D\u2060\uFEFF]/g,'');
  $('#apikey').value=k;
  S.apiKey=k; S.model=$('#model').value.trim()||'claude-sonnet-4-6'; save();
  if(!k){$('#keystatus').innerHTML='<div class="fb bad">Field is empty — nothing saved.</div>';return;}
  let warn='';
  if(!k.startsWith('sk-ant-'))warn=' ⚠️ It does not start with sk-ant- — is it an Anthropic API key?';
  else if(k.length<50)warn=' ⚠️ Only '+k.length+' chars — this looks like the REDACTED key from the Console list (sk-ant-…xxxx). Create a new key and copy it from the creation dialog.';
  $('#keystatus').innerHTML='<div class="fb '+(warn?'bad':'good')+'">Saved: '+esc(k.slice(0,12))+'…'+esc(k.slice(-4))+' ('+k.length+' chars).'+warn+' Now tap “Test key”.</div>';
}
async function testKey(){
  if(!S.apiKey){$('#keystatus').innerHTML='<div class="fb bad">Save a key first.</div>';return;}
  $('#keystatus').innerHTML='<div class="fb"><span class="spin"></span> Testing against the API…</div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'content-type':'application/json','x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.model||'claude-sonnet-4-6',max_tokens:8,
        messages:[{role:'user',content:'Reply with the single word: ok'}]})});
    if(r.ok){$('#keystatus').innerHTML='<div class="fb good">✓ Key works. Feedback is live.</div>';return;}
    const t=await r.text(); let hint='';
    if(r.status===401)hint=' → The key itself is wrong/incomplete. Most common cause: copying the shortened sk-ant-…xxxx from the Console keys list instead of the full key shown once at creation. Create a fresh key.';
    else if(r.status===400&&/credit|billing/i.test(t))hint=' → Key is valid but the account has no credits. Add billing in the Console.';
    else if(r.status===404)hint=' → Model name not recognized — check the Model field (default: claude-sonnet-4-6).';
    else if(r.status===429)hint=' → Rate limited; key is valid. Try again in a minute.';
    $('#keystatus').innerHTML='<div class="fb bad">✗ API '+r.status+': '+esc(t.slice(0,160))+hint+'</div>';
  }catch(e){$('#keystatus').innerHTML='<div class="fb bad">✗ Network error: '+esc(e.message)+'. Check your connection.</div>';}
}

// ---------- sheet (lesson player) ----------
let L=null; // {chap, steps, i, answers}
function sheetHTML(h){$('#sheetInner').innerHTML=h;$('#sheet').classList.add('open');$('#sheet').scrollTop=0;}
function closeSheet(){$('#sheet').classList.remove('open');stopTimer();render();}

function openLesson(id){
  const c=chById(id); if(!c||chState(c)==='locked')return;
  if(!S.done[c.id]){
    if(S.newDay!==todayStr()){S.newDay=todayStr();S.newCount=0;save();}
    if(S.cap>0&&S.newCount>=S.cap&&S.capOver!==todayStr()){gateSheet();return;}
  }
  const steps=[];
  if(c.teach)steps.push({t:'teach'});
  (c.quiz||[]).forEach((q,i)=>steps.push({t:'quiz',q,i}));
  if(c.kind==='calib')steps.push({t:'calib'});
  if(c.drill)steps.push({t:'drill'});
  if(c.mission)steps.push({t:'mission'});
  if(c.checkin)steps.push({t:'checkinIntro'});
  steps.push({t:'done'});
  L={chap:c,steps,i:0,correct:0,redo:S.done[c.id]};
  renderStep();
}
function stepNext(){L.i++;renderStep();}
function renderStep(){
  const c=L.chap, st=L.steps[L.i];
  const pct=Math.round(L.i/L.steps.length*100);
  let h='<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:'+pct+'%"></div></div></div>';
  h+='<div class="small" style="margin-bottom:6px">'+c._unit.icon+' '+esc(c._unit.title)+' · '+esc(c.title)+'</div>';
  if(!st){closeSheet();return;}
  if(st.t==='teach'){
    h+='<div class="teach">'+c.teach+'</div><button class="btn" style="margin-top:14px" onclick="stepNext()">Continue</button>';
  }
  else if(st.t==='quiz'){
    h+='<h3>'+esc(st.q.q)+'</h3>'+st.q.opts.map((o,j)=>'<button class="opt" id="opt'+j+'" onclick="answerQuiz('+j+')">'+esc(o[0])+'</button>').join('')+'<div id="qfb"></div>';
  }
  else if(st.t==='calib'){
    h+=renderCalib();
  }
  else if(st.t==='drill'||st.t==='mission'){
    const d=st.t==='drill'?c.drill:c.mission;
    h+='<div class="teach"><div class="key">'+(d.prompt||d.text)+'</div></div>';
    if(c.drill&&c.drill.pickbug){
      const open=S.bugs.filter(b=>b.st==='open');
      if(open.length)h+='<label class="fld">Pick a bug (optional)</label><select id="bugsel"><option value="">—</option>'+open.map(b=>'<option>'+esc(b.t.slice(0,80))+'</option>').join('')+'</select>';
    }
    const tm=(st.t==='drill'&&c.drill.timer)?c.drill.timer:null;
    if(tm)h+='<div class="timerbox card"><div class="t" id="tdisp">'+tm+':00</div><button class="btn sm warn" id="tbtn" onclick="startTimer('+tm+')">▶ Start '+tm+'-min timer</button></div>';
    h+='<textarea id="ans" placeholder="'+esc(d.placeholder||'Your report…')+'"></textarea>';
    h+='<div id="fbzone"></div>';
    h+='<div class="row" style="margin-top:10px">';
    if(S.apiKey)h+='<button class="btn" id="fbbtn" onclick="getFeedback()">Get Claude feedback</button>';
    h+='<button class="btn '+(S.apiKey?'sec':'')+'" onclick="selfGrade()">'+(S.apiKey?'Self-grade':'Submit & self-grade')+'</button></div>';
    h+='<button class="btn ghost" style="margin-top:6px" onclick="if(confirm(\'Skip without practicing? The technique stays uninstalled.\'))stepNext()">Skip for now</button>';
  }
  else if(st.t==='checkinIntro'){
    const k=c.checkin;
    h+='<div class="teach"><div class="key">⏰ <b>Standing practice unlocked: '+esc(k.label)+'</b><br>'+esc(k.ask)+'<br><br>Praxis will expect this every <b>'+k.every+'h</b> and nag you when overdue. You can change the interval or pause it in the Habits tab.</div></div>';
    h+='<label class="fld">Check-in window (hours)</label><input type="number" id="ckint" value="'+k.every+'">';
    h+='<button class="btn" style="margin-top:12px" onclick="acceptCheckin()">Accept this practice</button>';
  }
  else if(st.t==='done'){
    const xp=L.redo?5:({learn:20,drill:30,field:40,checkin:20,calib:25}[c.kind]||20);
    h+='<div class="center" style="padding:40px 0"><div style="font-size:4rem">'+(L.redo?'🔁':'🎉')+'</div><h2>'+(L.redo?'Reviewed':'Chapter complete')+'</h2>'+
      '<p class="small">'+(c.cards&&c.cards.length?c.cards.length+' card'+(c.cards.length>1?'s':'')+' added to spaced repetition.':'')+'</p>'+
      '<button class="btn" onclick="finishLesson('+xp+')">Claim +'+xp+' XP</button></div>';
  }

function answerQuiz(j){
  const st=L.steps[L.i], o=st.q.opts[j];
  st.q.opts.forEach((oo,k)=>{const el=$('#opt'+k);el.disabled=true;
    if(oo[1])el.classList.add('right');else if(k===j)el.classList.add('wrong');});
  $('#qfb').innerHTML='<div class="fb '+(o[1]?'good':'bad')+'"><b>'+(o[1]?'✓ Correct.':'✗ Not quite.')+'</b> '+esc(o[2])+'</div>'+
    '<button class="btn" onclick="stepNext()">Continue</button>';
  if(o[1]){L.correct++;if(!L.redo)addXP(5);}
}
// ---- calibration step ----
let CAL=null;
function renderCalib(){
  const c=L.chap, n=c.calib||10;
  if(!CAL){
    const unseen=CALIB_BANK.map((_,i)=>i).filter(i=>!S.calibSeen.includes(i));
    let pool=unseen.length>=n?unseen:CALIB_BANK.map((_,i)=>i);
    pool=pool.sort(()=>Math.random()-0.5).slice(0,n);
    CAL={qs:pool,i:0,conf:null,score:0};
  }
  if(CAL.i>=CAL.qs.length){
    const recent=S.calib.slice(-CAL.qs.length);
    const acc=Math.round(recent.filter(x=>x.correct).length/recent.length*100);
    const avg=Math.round(recent.reduce((a,x)=>a+x.conf,0)/recent.length);
    const verdict=avg>acc+7?'Overconfident: your numbers ran ahead of your accuracy. Shrink the big numbers.':(acc>avg+7?'Underconfident: you know more than you claim. Trust the 80s.':'Nicely calibrated on this batch.');
    setTimeout(()=>{ // replace step content
      sheetHTML('<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:90%"></div></div></div>'+
      '<div class="center" style="padding:20px 0"><h2>📊 Batch result</h2><div class="statgrid" style="text-align:left"><div class="card"><div class="big">'+acc+'%</div><div class="small">accuracy</div></div><div class="card"><div class="big">'+avg+'%</div><div class="small">avg confidence</div></div></div>'+
      '<div class="fb '+(Math.abs(avg-acc)<=7?'good':'bad')+'" style="text-align:left">'+verdict+' Lifetime: '+S.calib.length+' answers. Re-run this chapter anytime — calibration is a workout, not a fact.</div>'+
      '<button class="btn" onclick="CAL=null;stepNext()">Continue</button></div>');},0);
    return '<div></div>';
  }
  const q=CALIB_BANK[CAL.qs[CAL.i]];
  let h='<h3>Statement '+(CAL.i+1)+'/'+CAL.qs.length+'</h3><div class="srcard">'+esc(q[0])+'</div>';
  h+='<p class="small" style="margin-top:10px">True or false — and how confident?</p>';
  h+='<div class="row"><button class="btn sm" onclick="CAL.ansTF=true;calHi(this)">TRUE</button><button class="btn sm sec" onclick="CAL.ansTF=false;calHi(this)">FALSE</button></div>';
  h+='<div class="conf">'+[50,60,70,80,90,99].map(p=>'<button onclick="calConf('+p+',this)">'+p+'%</button>').join('')+'</div>';
  h+='<div id="calfb"></div>';
  return h;
}
function calHi(btn){document.querySelectorAll('.row .btn').forEach(b=>b.classList.add('sec'));btn.classList.remove('sec');}
function calConf(p,btn){
  if(CAL.ansTF===undefined)return toast('Pick true/false first');
  document.querySelectorAll('.conf button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  const q=CALIB_BANK[CAL.qs[CAL.i]];
  const correct=CAL.ansTF===q[1];
  S.calib.push({conf:p,correct,ts:Date.now()});
  if(!S.calibSeen.includes(CAL.qs[CAL.i]))S.calibSeen.push(CAL.qs[CAL.i]);
  save();
  $('#calfb').innerHTML='<div class="fb '+(correct?'good':'bad')+'"><b>'+(correct?'✓ Correct':'✗ Wrong')+'</b> — it is '+(q[1]?'TRUE':'FALSE')+'. You said '+p+'%. '+(correct?(p<70?'If you keep being right at low confidence, trust yourself more.':''):(p>=90?'A '+p+'% miss should sting — let it recalibrate you.':''))+'</div>'+
    '<button class="btn" onclick="CAL.i++;CAL.ansTF=undefined;if(!L.redo)addXP(2);sheetHTML(rebuildCalib())">Next</button>';
}
function rebuildCalib(){
  const pct=Math.round(L.i/L.steps.length*100);
  return '<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:'+pct+'%"></div></div></div>'+
  '<div class="small" style="margin-bottom:6px">'+L.chap._unit.icon+' '+esc(L.chap._unit.title)+' · '+esc(L.chap.title)+'</div>'+renderCalib();
}

function rubricFor(){const c=L.chap;return c.rubric||(c.drill&&c.drill.rubric)||[];}
async function getFeedback(){
  const a=gatherAnswer(); if(a.length<30)return toast('Write your real attempt first');
  const c=L.chap, st=L.steps[L.i];
  const ex=st.t==='drill'?c.drill.prompt:c.mission.text;
  $('#fbbtn').innerHTML='<span class="spin"></span> Coach is reading…';$('#fbbtn').disabled=true;
  try{
    const fb=await claudeFeedback(c,ex,rubricFor(),a,'Open bugs in user ledger: '+S.bugs.filter(b=>b.st==='open').length);
    $('#fbzone').innerHTML='<div class="feedback-md">🧑‍🏫 '+esc(fb)+'</div><button class="btn" onclick="acceptDrill()">Accept & continue</button>';
  }catch(e){
    $('#fbzone').innerHTML='<div class="fb bad">Feedback failed ('+esc(e.message)+'). Check key/connection in ⚙️, or self-grade below.</div>';
  }

function selfGrade(){

  '<p class="small">Check only what your response HONESTLY satisfies. Unchecked items = your next attempt’s targets.</p><button class="btn" onclick="acceptDrill()">Done — continue</button></div>';
  if($('#fbzone').scrollIntoView)$('#fbzone').scrollIntoView({behavior:'smooth'});
}
function acceptDrill(){
  const c=L.chap, a=gatherAnswer();
  S.reports.push({ts:Date.now(),chap:c.id,text:a.slice(0,4000)});
  // captures
  if(c.drill&&c.drill.bugcapture){
    const lines=a.split('\n').map(l=>l.replace(/^[-*•]\s*/,'').trim()).filter(l=>l&&!/^(generator|bug)s?\s*:/i.test(l)&&l.length>3);
    lines.slice(0,12).forEach(l=>addBug(l));
    toast(lines.length+' bugs filed to ledger');
  }
  if(c.drill&&c.drill.tapcapture){
    const m=a.match(/TAP\s*:\s*(.+)/i);
    if(m){S.taps.push({t:m[1].trim(),ts:Date.now()});
      const id='tap#'+uid();
      S.cards[id]={ease:2.5,ivl:0,due:Date.now(),f:'Recite your installed TAP (verbatim):',b:m[1].trim(),reps:0};
      toast('TAP installed + added to review');}
  }
  save(); stopTimer(); stepNext();
}
function acceptCheckin(){
  const c=L.chap, k=c.checkin;
  const n=parseInt($('#ckint').value)||k.every;
  if(!S.habits[k.key])S.habits[k.key]={since:Date.now(),last:Date.now(),every:n,paused:false};
  else S.habits[k.key].every=n;
  save(); stepNext();
}
function finishLesson(xp){
  const c=L.chap;
  if(!S.done[c.id]){S.done[c.id]=Date.now();if(repEligible(c))S.reps[c.id]={i:0,due:Date.now()+REP_IVLS[0]*DAY,count:0};if(S.newDay!==todayStr()){S.newDay=todayStr();S.newCount=0;}S.newCount++;}
  ensureCards(c); addXP(xp); save(); closeSheet();
}

// ---- habit execution ----
function doHabit(k){
  const m=habitMeta(k); if(!m)return;
  let h='<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:50%"></div></div></div>'+
    '<h2>'+m.icon+' '+esc(m.label)+'</h2><div class="teach"><div class="key">'+esc(m.ask)+'</div></div>';
  if(m.timer)h+='<div class="timerbox card"><div class="t" id="tdisp">'+m.timer+':00</div><button class="btn sm warn" onclick="startTimer('+m.timer+')">▶ Start '+m.timer+'-min timer</button></div>';
  if(m.form==='bugs'){
    h+='<textarea id="ans" placeholder="One bug per line…"></textarea><button class="btn" style="margin-top:10px" onclick="habitBugs(\''+k+'\')">File & complete</button>';
  }else if(m.form==='predict-min'){
    h+='<label class="fld">Task</label><input type="text" id="ptask" placeholder="Write the monthly report">'+
       '<label class="fld">Predicted minutes</label><input type="number" id="pmin" placeholder="45">'+
       '<button class="btn" style="margin-top:12px" onclick="habitPredMin(\''+k+'\')">Lock prediction</button>';
  }else if(m.form==='predict-prob'){
    h+='<label class="fld">Falsifiable prediction</label><input type="text" id="ptask" placeholder="I leave the office by 18:30 today">'+
       '<label class="fld">Probability</label><div class="conf">'+[50,60,70,80,90,95,99].map(p=>'<button onclick="window._pp='+p+';document.querySelectorAll(\'.conf button\').forEach(b=>b.classList.remove(\'sel\'));this.classList.add(\'sel\')">'+p+'%</button>').join('')+'</div>'+
       '<button class="btn" style="margin-top:12px" onclick="habitPredProb(\''+k+'\')">Lock prediction</button>';
  }else{
    h+='<textarea id="ans" placeholder="Your report…"></textarea><div id="fbzone"></div><div class="row" style="margin-top:10px">'+
      (S.apiKey?'<button class="btn" id="fbbtn" onclick="habitFeedback(\''+k+'\')">Get Claude feedback</button>':'')+
      '<button class="btn '+(S.apiKey?'sec':'')+'" onclick="habitDone(\''+k+'\')">Complete</button></div>';
  }
  sheetHTML(h);
}
function habitBugs(k){
  const a=$('#ans').value; const lines=a.split('\n').map(l=>l.replace(/^[-*•]\s*/,'').trim()).filter(l=>l.length>3);
  if(!lines.length)return toast('File at least one bug');
  lines.slice(0,12).forEach(addBug);
  completeHabit(k,lines.length+' bug(s) filed');
}
function habitPredMin(k){
  const t=$('#ptask').value.trim(), v=parseFloat($('#pmin').value);
  if(!t||!(v>0))return toast('Task + minutes needed');
  S.preds.push({id:uid(),text:t,type:'min',val:v,made:Date.now(),resolved:0,outcome:null});
  completeHabit(k,'Prediction locked — resolve it in Habits when done');
}
function habitPredProb(k){
  const t=$('#ptask').value.trim(), p=window._pp;
  if(!t||!p)return toast('Prediction + probability needed');
  S.preds.push({id:uid(),text:t,type:'prob',val:p,made:Date.now(),resolved:0,outcome:null});
  window._pp=null;
  completeHabit(k,'Forecast locked — resolve it when reality answers');
}
async function habitFeedback(k){
  const a=$('#ans').value.trim(); if(a.length<30)return toast('Write your real report first');
  const m=habitMeta(k);
  const fake={title:m.label,_unit:{title:'Standing practice'}};
  $('#fbbtn').innerHTML='<span class="spin"></span> Coach is reading…';$('#fbbtn').disabled=true;
  try{
    const fb=await claudeFeedback(fake,m.ask,['Practice actually performed on real life, not narrated hypothetically','Specific and concrete (names, actions, observations)','Honest about failures/skips','Contains the practice’s key artifact (bug/TAP verdicts/fix/etc.)'],a,'');
    $('#fbzone').innerHTML='<div class="feedback-md">🧑‍🏫 '+esc(fb)+'</div>';
  }catch(e){$('#fbzone').innerHTML='<div class="fb bad">Feedback failed: '+esc(e.message)+'</div>';}
  $('#fbbtn').innerHTML='Get Claude feedback';$('#fbbtn').disabled=false;
}
function habitDone(k){
  const a=$('#ans')?$('#ans').value.trim():'';
  if(a.length<10)return toast('A few honest lines, minimum');
  S.reports.push({ts:Date.now(),chap:'habit:'+k,text:a.slice(0,4000)});
  completeHabit(k,'Practice logged');
}
function completeHabit(k,msg){
  S.habits[k].last=Date.now(); delete S.notified[k]; save();
  addXP(20); toast('✓ '+msg); closeSheet();
}

// ---- daily cap gate ----
function gateSheet(){
  const rp=dueReps().length, dh=dueHabits().length, dc=dueCards().length;
  sheetHTML('<div class="top"><button class="x" onclick="closeSheet()">✕</button></div>'+
   '<div class="center" style="padding:26px 0"><div style="font-size:3.2rem">⛩️</div><h2>The dojo caps new material</h2>'+
   '<p class="small" style="max-width:420px;margin:8px auto">You have opened '+S.newCount+'/'+S.cap+' new chapters today. Skill grows in the gap between lessons — and you currently have '+dc+' cards, '+rp+' reps and '+dh+' check-ins waiting. That is where today\'s XP lives.</p>'+
   '<div class="row" style="max-width:340px;margin:14px auto 0"><button class="btn" onclick="closeSheet();setTab(\'review\')">Review cards</button><button class="btn sec" onclick="closeSheet();setTab(\'habits\')">Reps & check-ins</button></div>'+
   '<button class="btn ghost" style="margin-top:10px" onclick="if(confirm(\'Lift the cap for today? (Binging new chapters is the Reading attitude\\\'s failure mode wearing your face.)\')){S.capOver=todayStr();save();closeSheet();toast(\'Cap lifted until midnight\');}">Lift the cap today</button></div>');
}

// ---- custom technique editor ----
function openEditor(id){
  const x=((S.custom)||[]).find(c=>c.id===id)||{};
  let h='<div class="top"><button class="x" onclick="closeSheet()">✕</button></div><h2>🎨 '+(id?'Edit':'New')+' technique</h2>';
  h+='<label class="fld">Name</label><input type="text" id="etitle" value="'+esc(x.title||'')+'" placeholder="Pre-mortem walk">';
  h+='<label class="fld">Icon (one emoji)</label><input type="text" id="eicon" value="'+esc(x.icon||'')+'" placeholder="🚶">';
  h+='<label class="fld">Teaching notes (when to use it, the steps, why it works)</label><textarea id="eteach" placeholder="When [trigger], do: 1)... 2)...\nMechanism: ...">'+esc(x.teach||'')+'</textarea>';
  h+='<label class="fld">Drill prompt (what to actually do + report — leave empty for a pure check-in)</label><textarea id="edrill" placeholder="Run the technique on a real ... Report: ...">'+esc(x.drillPrompt||'')+'</textarea>';
  h+='<label class="fld">Rubric (one criterion per line — used by Claude feedback and self-grading)</label><textarea id="erub" placeholder="Used real material\nTrigger was specific">'+esc((x.rubric||[]).join('\n'))+'</textarea>';
  h+='<label class="fld">Flashcards (one per line: front :: back)</label><textarea id="ecards" placeholder="My technique X — trigger? :: When ...">'+esc((x.cards||[]).map(c=>c[0]+' :: '+c[1]).join('\n'))+'</textarea>';
  h+='<label class="fld">Check-in interval in hours (0 = none; the rep scheduler covers non-recurring drills)</label><input type="number" id="eevery" value="'+(x.every||0)+'">';
  h+='<button class="btn" style="margin-top:14px" onclick="saveCustomForm(\''+(id||'')+'\')">Save technique</button>';
  if(id)h+='<button class="btn ghost" style="margin-top:6px" onclick="delCustom(\''+id+'\')">Delete technique</button>';
  sheetHTML(h);
}
function saveCustomForm(id){
  const title=$('#etitle').value.trim(); if(!title)return toast('Name it first');
  const obj={id:id||('cust'+uid()),title,icon:$('#eicon').value.trim().slice(0,4),
    teach:$('#eteach').value.trim(),drillPrompt:$('#edrill').value.trim(),
    rubric:$('#erub').value.split('\n').map(l=>l.trim()).filter(Boolean),
    cards:$('#ecards').value.split('\n').map(l=>l.split('::')).filter(a=>a.length===2).map(a=>[a[0].trim(),a[1].trim()]),
    every:parseInt($('#eevery').value)||0};
  S.custom=S.custom||[];
  const i=S.custom.findIndex(c=>c.id===obj.id);
  if(i>=0)S.custom[i]=obj; else S.custom.push(obj);
  save(); rebuild(); closeSheet(); toast('🎨 Technique saved');
}
function delCustom(id){
  if(!confirm('Delete this technique? Its reps and check-in go with it.'))return;
  S.custom=(S.custom||[]).filter(c=>c.id!==id);
  delete S.reps[id]; delete S.habits['cust_'+id]; delete S.done[id];
  save(); rebuild(); closeSheet(); render();
}

// ---- practice rep execution ----
function doRep(id){
  const c=chById(id), r=S.reps[id]; if(!c||!r)return;
  const d=c.drill||c.mission;
  let h='<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:50%"></div></div></div>';
  h+='<div class="small" style="margin-bottom:6px">'+c._unit.icon+' '+esc(c._unit.title)+' · '+esc(c.title)+' · rep #'+(r.count+1)+'</div>';
  h+='<div class="teach"><div class="key">🔁 '+esc(REPHINTS[id]||'Run this technique again on a NEW real target — different from last time.')+'</div></div>';
  h+='<details><summary>Original exercise & rubric</summary><div class="teach"><div class="ex">'+(d.prompt||d.text)+'</div><div class="small">'+(c.rubric||(c.drill&&c.drill.rubric)||[]).map(x=>'• '+esc(x)).join('<br>')+'</div></div></details>';
  if(c.drill&&c.drill.timer)h+='<div class="timerbox card"><div class="t" id="tdisp">'+c.drill.timer+':00</div><button class="btn sm warn" onclick="startTimer('+c.drill.timer+')">▶ Start '+c.drill.timer+'-min timer</button></div>';
  h+='<textarea id="ans" placeholder="'+esc((d.placeholder||'Your report…'))+'"></textarea><div id="fbzone"></div>';
  if(S.apiKey)h+='<button class="btn" id="fbbtn" style="margin-top:10px" onclick="repFeedback(\''+id+'\')">Get Claude feedback</button>';
  h+='<p class="small" style="margin-top:12px">How did the rep go? (sets the next interval)</p>'+
    '<div class="row"><button class="btn sm warn" onclick="repGrade(\''+id+'\',0)">Hard — again in '+repInterval(r.i)+'d</button>'+
    '<button class="btn sm" onclick="repGrade(\''+id+'\',1)">Good — '+repInterval(r.i+1)+'d</button>'+
    '<button class="btn sm sec" onclick="repGrade(\''+id+'\',2)">Easy — '+repInterval(r.i+2)+'d</button></div>';
  sheetHTML(h);
}
async function repFeedback(id){
  const a=$('#ans').value.trim(); if(a.length<30)return toast('Write your real attempt first');
  const c=chById(id), d=c.drill||c.mission;
  $('#fbbtn').innerHTML='<span class="spin"></span> Coach is reading…';$('#fbbtn').disabled=true;
  try{
    const fb=await claudeFeedback(c,'PRACTICE REP (repeat of an earlier exercise on a fresh target): '+(REPHINTS[id]||'')+'\n\nOriginal exercise: '+(d.prompt||d.text),(c.rubric||(c.drill&&c.drill.rubric)||[]).concat(['Target is genuinely NEW, not a rehash of a previous attempt']),a,'This is rep #'+(S.reps[id].count+1)+' of this technique for this user.');
    $('#fbzone').innerHTML='<div class="feedback-md">🧑‍🏫 '+esc(fb)+'</div>';
  }catch(e){$('#fbzone').innerHTML='<div class="fb bad">Feedback failed: '+esc(e.message)+'</div>';}
  $('#fbbtn').innerHTML='Get Claude feedback';$('#fbbtn').disabled=false;
}
function repGrade(id,g){
  const a=$('#ans').value.trim(); if(a.length<30)return toast('Write your real attempt first — the rep is the doing, not the tap');
  const r=S.reps[id]; r.count++;
  if(g===1)r.i++; else if(g===2)r.i+=2;
  r.due=Date.now()+repInterval(r.i)*DAY;
  S.reports.push({ts:Date.now(),chap:'rep:'+id,text:a.slice(0,4000)});
  save(); stopTimer(); addXP(25);
  toast('🔁 Next rep in '+repInterval(r.i)+'d'); closeSheet();
}

// ---- SR session ----
let SR=null;
function startSR(){SR={q:dueCards().map(([id])=>id),i:0,flip:false};renderSR();}
function renderSR(){
  if(SR.i>=SR.q.length){sheetHTML('<div class="top"><button class="x" onclick="closeSheet()">✕</button></div><div class="center" style="padding:40px 0"><div style="font-size:3.5rem">🧠</div><h2>Review done</h2><button class="btn" onclick="addXP(Math.min(20,'+SR.q.length+'*2));closeSheet()">Claim XP</button></div>');return;}
  const id=SR.q[SR.i], c=S.cards[id];
  let h='<div class="top"><button class="x" onclick="closeSheet()">✕</button><div class="prog"><div style="width:'+Math.round(SR.i/SR.q.length*100)+'%"></div></div></div>';
  h+='<div class="srcard">'+esc(c.f)+(SR.flip?'<hr><div style="color:var(--gold)">'+esc(c.b)+'</div>':'')+'</div>';
  if(!SR.flip)h+='<button class="btn" style="margin-top:14px" onclick="SR.flip=true;renderSR()">Show answer</button>';
  else h+='<div class="srgrid">'+
    '<button style="background:var(--red)" onclick="srG(\''+id+'\',0)">Again</button>'+
    '<button style="background:var(--orange)" onclick="srG(\''+id+'\',1)">Hard</button>'+
    '<button style="background:var(--green)" onclick="srG(\''+id+'\',2)">Good</button>'+
    '<button style="background:var(--blue)" onclick="srG(\''+id+'\',3)">Easy</button></div>';
  sheetHTML(h);
}
function srG(id,g){gradeCard(id,g);SR.i++;SR.flip=false;renderSR();}

// ---- timer ----
let TMR=null;
function startTimer(min){
  stopTimer(); let left=min*60;
  const d=$('#tdisp'); if(!d)return;
  TMR=setInterval(()=>{
    left--; if(!$('#tdisp')){stopTimer();return;}
    $('#tdisp').textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
    if(left<=0){stopTimer();$('#tdisp').textContent='⏰ TIME';
      try{navigator.vibrate&&navigator.vibrate([300,150,300]);}catch(e){}
      if(S.notif&&Notification.permission==='granted')try{new Notification('Praxis',{body:'Timer done — write your report.'});}catch(e){}
      toast('⏰ Timer done — report what you DID');}
  },1000);
}
function stopTimer(){if(TMR){clearInterval(TMR);TMR=null;}}

// ---------- boot ----------
load(); rebuild(); rollover(); render(); notifCheck();
if(S.ghToken&&S.gistId)syncPull();
window.addEventListener('visibilitychange',()=>{if(!document.hidden){rollover();render();notifCheck();if(S.ghToken&&S.gistId)syncPull();}});
