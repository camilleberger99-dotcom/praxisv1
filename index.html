{ id:'u11', icon:'🎲', color:'var(--gold)', title:'Epistemics', sub:'Calibration, Fermi, and the scout',
  source:[['Book: The Scout Mindset (Galef)','https://www.rationality.org/resources/reading-list'],['Book: Superforecasting (Tetlock)','https://www.rationality.org/resources/reading-list'],['Book: How to Measure Anything ideas via Fermi practice','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'u11c1', icon:'🔭', title:'Scout mindset', kind:'learn',
teach:`<p>Julia Galef's frame: reasoning runs in one of two modes. The <b>soldier</b> asks "can I believe this?" of friendly evidence and "must I believe this?" of hostile evidence. The <b>scout</b> asks one question of everything: <i>"is it true?"</i> — because the scout's job is an accurate map, and inaccurate maps get scouts killed.</p>
<h4>Field tests for catching your inner soldier</h4>
<p>• <b>Selective rigor:</b> you demand citations only from conclusions you dislike.<br>• <b>The relief tell:</b> finding a flaw in opposing evidence feels like <i>relief</i> — that is defense, not inquiry.<br>• <b>The status quo swap:</b> would you choose your current job/city/stack if you did not already have it?<br>• <b>The true rejection:</b> is the objection you are voicing the thing that would actually change your mind?</p>
<div class="key">Scout mindset is not niceness or fence-sitting. Scouts can hold strong positions — they just bought them with evidence and keep the receipt.</div>`,
quiz:[
{q:'You notice you feel RELIEF on finding a methodological flaw in a study that contradicts you. What is that feeling?',opts:[
['Good epistemic instincts rewarding rigor',0,'If rigor were the motive, the same flaw-hunting energy would aim at studies you agree with. Does it?'],
['A soldier-mindset tell: you were defending, not inquiring',1,'Yes — relief means the conclusion was the goal. A scout finding a flaw feels something closer to "hm, okay, updating less then."'],
['Proof the study was wrong',0,'A flaw weakens evidence; your relief is information about YOU, not about the study’s truth value.']]},
{q:'"Would you choose your current situation if you did not already have it?" — what bias does this swap test detect?',opts:[
['Sunk cost / status quo rationalization',1,'Right — the soldier defends the existing position because it is yours. The swap removes the ownership and asks the scout question directly.'],
['The planning fallacy',0,'That is about time estimation — Unit 8’s territory.'],
['Anchoring on numbers',0,'Different bias; the swap targets attachment to incumbent choices.']]}],
cards:[
['Soldier vs scout — the two questions','Soldier: "CAN I believe this?" (friendly evidence) / "MUST I believe this?" (hostile). Scout: "Is it true?" — of everything, symmetrically.'],
['The relief tell','Feeling relief when finding a flaw in opposing evidence = you were defending a conclusion, not inquiring. Scouts update; soldiers celebrate.'],
['What is your "true rejection"?','The consideration that would ACTUALLY change your mind — often not the objection you say out loud. Arguing past it wastes everyone’s time, including yours.']],
},

{ id:'u11c2', icon:'🎯', title:'Calibration training', kind:'calib',
teach:`<p>A calibrated mind, when it says "70% sure," is right about 70% of the time. Calibration is the rare epistemic skill with a <b>tight feedback loop</b> — which makes it trainable in-app, the Basics-attitude way.</p>
<p>Below: trivia statements. Answer true/false AND give your confidence. The score that matters is not accuracy — it is whether your 90%s behave like 90%s. Overconfidence shows up within twenty questions, in numbers you cannot argue with.</p>
<div class="key">Transfer rule: the point is not trivia — it is learning what 70% <i>feels like from the inside</i>, so you can attach honest numbers to "the client will sign" and "I will finish by Friday."</div>`,
calib:10,
cards:[
['What does it mean to be calibrated?','When you say "70% confident," you are right ~70% of the time. Tested by tracking confidence vs outcomes over many predictions.'],
['Why train calibration on trivia?','Tight, fast feedback loop. The transferable skill is knowing what 70% vs 95% FEELS like from inside, for use on real predictions.']],
},

{ id:'u11c3', icon:'✉️', title:'Fermi estimates', kind:'drill',
teach:`<p>A <b>Fermi estimate</b> decomposes an unknowable-sounding number into multipliable known-ish parts. Piano tuners in Chicago, sure — but the life-relevant versions are better: <i>What does this meeting cost in salary? How many deep-work hours do I actually have left this year? What is my commute worth over a decade?</i></p>
<h4>Method</h4>
<p>1. Decompose into factors you can bound.<br>2. Estimate each within a factor of ~3 (use ranges).<br>3. Multiply; keep units honest (the #1 Fermi bug is unit drift).<br>4. Sanity-check against a known anchor.<br>5. Note which factor dominates the uncertainty — that is the one worth refining.</p>
<div class="ex"><b>Example:</b> "Is it worth automating this weekly report?" 45 min/week × 48 weeks ≈ 36 h/year. Automation: ~8 h to build + 30 min/quarter upkeep ≈ 10 h/year-one. Pays back in under 4 months; dominant uncertainty: the build estimate (apply your Unit 8 fudge ratio).</div>`,
drill:{prompt:`Run a Fermi estimate on a real decision-relevant quantity in YOUR life (cost of a habit, value of an automation, hours of X remaining this year...). Show: decomposition, per-factor estimates with rough ranges, the multiplication, a sanity-check anchor, and the dominant uncertainty.`,
placeholder:'Question: ...\nDecomposition: ...\nFactors: A ≈ ... (range ...), B ≈ ...\nResult: ... Sanity check: ...\nDominant uncertainty: ...',min:8},
rubric:['Quantity is real and decision-relevant to the author','Decomposition into boundable factors; units tracked correctly throughout','Ranges acknowledged, not false precision','Sanity-check anchor used; dominant uncertainty identified correctly'],
cards:[
['Fermi method — 5 steps','Decompose → estimate factors within ~3× (ranges) → multiply with honest units → sanity-check vs known anchor → name the dominant uncertainty.'],
['#1 Fermi bug','Unit drift — minutes silently becoming hours, per-week becoming per-year. Keep units attached to every number.']],
},

{ id:'u11c4', icon:'🌦️', title:'Daily forecasts', kind:'checkin',
teach:`<p>Superforecasters are made by volume: many small predictions, scored honestly, updated incrementally. Your standing practice: <b>one real prediction per day with a probability</b>, about your own life or world events. "Package arrives before Saturday: 80%." "I leave the office by 18:30: 60%."</p>
<p>Resolve them when reality answers. Praxis tracks your Brier score and calibration curve over time.</p>
<div class="key">Bayes for humans, minimal version: your probability should move when evidence arrives, by an amount that would not embarrass you in either direction. Writing the number down BEFORE is what makes the embarrassment detectable — and therefore the learning possible. (Maths-attitude readers: each resolved forecast is one update step; the Brier score is your loss function.)</div>`,
checkin:{key:'forecast',label:'Daily Forecast',icon:'🎲',every:24,
ask:'Make one falsifiable prediction with a probability (about your day, week, or the world). Resolve pending ones in the Habits tab when reality answers.',
form:'predict-prob'},
cards:[
['Why write the probability BEFORE the outcome?','Pre-registration makes miscalibration detectable (and feelable). Post-hoc "I knew it" destroys the training signal.'],
['Brier score — what is it?','Mean of (probability − outcome)² over your forecasts. Lower is better; 0.25 = coin-flip guessing on binary events at 50%.']],
},
]},

{ id:'u12', icon:'🌉', color:'var(--orange)', title:'Double Crux', sub:'Disagreement as a search problem',
  source:[['CFAR Handbook: Double Crux','https://www.rationality.org/resources/handbook']],
  chapters:[

{ id:'u12c1', icon:'🪜', title:'Cruxes', kind:'learn',
teach:`<p>A <b>crux</b> for your belief B is a claim C such that if you changed your mind about C, you would change your mind about B. Most stated arguments are not cruxes — they are decoration on a conclusion reached elsewhere.</p>
<p><b>Double Crux</b>, between two people who disagree: instead of exchanging volleys, both search for a <i>shared</i> crux — a sub-claim where (a) they disagree and (b) each would update on B if they updated on it. Then they investigate THAT, often with actual evidence, because it is concrete and smaller.</p>
<div class="ex"><b>Example:</b> "We should/should not rewrite the backend." Search finds the double crux: "the current system can(not) handle next year’s load with patches." That is researchable — benchmark it — where the original disagreement was just two aesthetics colliding.</div>
<div class="key">The honest entry fee: asking yourself "what would actually change MY mind?" — and noticing when the answer is "nothing," which means you were not having a disagreement, you were having a war. (Unit 11’s true-rejection test, now with witnesses.)</div>`,
quiz:[
{q:'What makes a claim C a crux for your belief B?',opts:[
['C is your strongest argument for B',0,'Arguments are often post-hoc decoration. The test is counterfactual: would flipping C flip B? Many "strong arguments" fail it.'],
['If you changed your mind about C, you would change your mind about B',1,'Exactly — cruxes are defined by counterfactual impact on your belief, not by rhetorical strength.'],
['C is something your opponent already accepts',0,'That is a premise for persuasion, a different game. Cruxes are about where YOUR belief actually rests.']]},
{q:'Why is finding a DOUBLE crux so productive?',opts:[
['It proves one side right immediately',0,'It does not settle anything by itself — it relocates the disagreement to ground where settling is possible.'],
['It reduces a large vague disagreement to a smaller concrete claim both sides have agreed to update on — often one you can just test',1,'Right. The fight becomes a research question with pre-committed stakes, which is the entire trick.'],
['It avoids conflict',0,'Double crux often sharpens conflict initially — it just makes the conflict tractable.']]}],
cards:[
['Crux — definition','A claim C such that changing your mind about C would change your mind about belief B. Test is counterfactual, not rhetorical strength.'],
['Double crux — what are you searching for?','A sub-claim where both parties disagree AND both would update their top-level belief if they updated on it. Then investigate that, with evidence if possible.']],
},

{ id:'u12c2', icon:'🧭', title:'Crux a live disagreement', kind:'drill',
teach:`<p>Pick a real disagreement you currently have — with a colleague, a friend, an author you read this week, or a past version of yourself. The other person does not need to participate (though it is better if they do); the discipline of finding YOUR cruxes is most of the value.</p>`,
drill:{prompt:`Take a live disagreement. Report: (a) your position B, stated fairly, (b) the other side’s position as THEY would state it (pass their ideological Turing test), (c) 2-3 candidate cruxes of yours — with the counterfactual check ("if I learned ___, I would change my mind"), (d) your guess at THEIR crux, (e) if a shared crux exists: what evidence would move it?`,
placeholder:'B (mine): ...\nTheir position, fairly: ...\nMy cruxes: 1) if I learned... 2) ...\nTheir likely crux: ...\nTestable how: ...',min:10},
rubric:['Disagreement is real and current','Opposing position passes a fair ideological Turing test (no strawman)','Cruxes pass the counterfactual test — flipping them would genuinely flip B','Identifies evidence that could move the shared crux, or honestly reports finding no crux ("nothing would change my mind" flagged as the finding it is)'],
cards:[
['Ideological Turing test','Stating the opposing position so its holders would accept it as their own. Entry fee for any honest disagreement work.']],
},
]},

{ id:'u13', icon:'🕳️', color:'var(--purple)', title:'The Abyss', sub:'The questions that actually matter',
  source:[['Hammertime: The Strategic Level','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/SYT8E7YThLHWr6JEm'],['CFAR Handbook: Hamming Questions','https://www.rationality.org/resources/handbook']],
  chapters:[

{ id:'u13c1', icon:'❓', title:'Hamming questions', kind:'drill',
teach:`<p>Richard Hamming ate lunch with Bell Labs scientists and asked: <i>"What are the most important problems in your field? And why are you not working on them?"</i> Careers changed; some colleagues stopped sitting with him.</p>
<p>Pointed at a life, the <b>Hamming questions</b> become: <i>What is the most important problem in your life right now — and why are you not working on it?</i></p>
<div class="key">Notice the question’s structure: it assumes a gap, and it is usually right, because important problems are precisely the ones that accumulate flinches (Unit 1), grow ugh-fields, and get crowded out by legible, easy, fake-urgent work. Your biggest bug is rarely ON your bug list. This chapter is where it gets filed.</div>
<p>Treat the next 15 minutes as protected. Use the timer. Focusing skills (Unit 9) help when the answer arrives as a body-knot rather than a sentence.</p>`,
drill:{prompt:`Sit with the Hamming pair for 15 timed minutes: "What is the most important problem in my life right now?" and "Why am I not working on it?" Report: (a) the problem (at whatever level of detail you choose), (b) the honest reasons for the gap — flinches, fears, structures, (c) the SMALLEST real next action, (d) file the problem as a ledger bug if it is not there already.`,
placeholder:'Most important problem: ...\nWhy not working on it: ...\nSmallest next action: ...\nFiled to ledger: yes',min:15,timer:15},
rubric:['Evidence of real sitting-with, not a cached answer (cached answers arrive in 30 seconds and sound rehearsed)','Gap reasons are honest and specific (names the flinch/fear/structure, not "no time")','Next action is genuinely small and concrete (doable within 48h)','Problem filed to the ledger'],
cards:[
['The Hamming questions (life version)','"What is the most important problem in your life right now?" + "Why are you not working on it?" — the gap the second question exposes is the finding.'],
['Why is your biggest bug rarely on your bug list?','Important problems accumulate flinches and ugh-fields, so they get systematically not-looked-at while legible fake-urgent work fills the list.']],
},

{ id:'u13c2', icon:'🌑', title:'Staring into the abyss', kind:'field',
teach:`<p>Ben Kuhn's term for deliberately considering the questions you flinch hardest from — the ones where a "yes" would demand large change: <i>Is this relationship right? Is this career mine or my parents’? Is this city, this cofounder, this faith still true for me?</i></p>
<p>People who excel at this schedule it ON PURPOSE, because no day ever volunteers for it. The format that works: a long walk, a notebook, one abyss question, no devices, a hard time-box (30-60 min), and a rule that <b>considering ≠ deciding</b> — you are allowed to look precisely because looking does not commit you.</p>
<div class="key">Time-boxing is load-bearing in both directions: it forces the look to happen, and it licenses you to stop. Abyss-staring without a box becomes either avoidance or rumination — the two failure modes this practice exists to replace.</div>`,
mission:{text:`<b>Field mission (schedule it this week):</b> one 30-60 min time-boxed abyss session — walk or notebook, no devices, ONE question you flinch from. Report: the question, 3-5 honest observations from the session (detail level is yours), and what — if anything — goes on the ledger or calendar as a result. "I looked and the answer is genuinely fine" is a valid, reportable outcome.`,
placeholder:'Question: ...\nObservations: ...\nResulting bug/action (or: looked, genuinely fine because ...): ...'},
rubric:['A real abyss-grade question (a "yes" would demand significant change)','Session actually happened: time-boxed, device-free, scheduled deliberately','Observations show contact with the question, not deflection into logistics','Outcome handled honestly: filed bug, scheduled action, or a justified "all-clear" — rumination not extended past the box'],
cards:[
['Staring into the abyss — definition & format','Deliberately, on a schedule, time-boxed (30-60 min, no devices): consider one question you flinch from, where "yes" demands big change. Considering ≠ deciding.'],
['The two failure modes the time-box prevents','Avoidance (the look never happens without scheduling) and rumination (the look never ends without a box).']],
},

{ id:'u13c3', icon:'♟️', title:'The strategic level', kind:'learn',
teach:`<p>Hammertime’s closing concept. Three levels of response to any mistake:</p>
<p>• <b>Object level:</b> fix the mistake (resend the email).<br>• <b>Tactical level:</b> install a guard against that mistake (checklist before sending — a TAP).<br>• <b>Strategic level:</b> ask what property of your <i>decision-making process</i> produced it, and what ELSE that property is currently producing. ("I committed in person to a deadline I had never simulated. Where else do I commit pre-simulation?")</p>
<div class="key">One strategic insight typically dissolves a whole FAMILY of bugs that object-level fixes would have whack-a-moled forever. This is also the right lens on your last 12 units: the techniques are tactics; noticing which tactic fires when, and what your characteristic failure-shape is — that is strategy. Your Final Exam unit is next.</div>`,
quiz:[
{q:'You sent the wrong attachment. Object, tactical, and strategic responses respectively are:',opts:[
['Apologize / triple-check everything always / be more careful',0,'"Triple-check everything" is unscalable and "be more careful" is not a process change — that is a wish wearing a strategy costume.'],
['Resend it / a TAP: attach-then-verify before send / ask "where else do I finalize-then-verify in the wrong order?"',1,'Right — and the strategic question is the only one of the three that pays compound interest across domains.'],
['Resend it / apologize twice / switch email clients',0,'Two object-level moves and a tool change. The strategic level interrogates the decision process, not the equipment.']]}],
cards:[
['Object / tactical / strategic responses to a mistake','Object: fix this instance. Tactical: install a guard (TAP/checklist) against this mistake. Strategic: identify the decision-process property that produced it — and what else it is producing.'],
['Why does the strategic level pay compound interest?','One process-level insight dissolves a whole family of bugs across domains; object fixes whack one mole each.']],
},
]},

{ id:'u14', icon:'🏔️', color:'var(--gold)', title:'Your Own Art', sub:'Graduation: become your own curriculum',
  source:[['Attitudes about Applied Rationality (Camille B.)','https://www.lesswrong.com/posts/5jdqtpT6StjKDKacw/attitudes-about-applied-rationality'],['Hammertime Final Exam','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/Q7MsMshzbzhEs729s']],
  chapters:[

{ id:'u14c1', icon:'🗺️', title:'Attitudes about applied rationality', kind:'learn',
teach:`<p>Zoom out. Within the rationalist community there are distinct <b>attitudes</b> — clusters of opinion about what practicing rationality should even mean (taxonomy: Camille B., LessWrong 2024). Knowing them helps you understand practitioners who baffle you, and diagnose your own blind spots:</p>
<p>• <b>Basics:</b> calibration, forecasting, lifehacks — real, simple, measurable practice over community immersion. (Your Unit 11.)<br>
• <b>Reading:</b> master the corpus — the Sequences, the CFAR reading list — before improvising. (The source links under every unit.)<br>
&nbsp;&nbsp;◦ <i>Maths sub-attitude:</i> the real foundations are Bayesian probability and decision theory; layman paraphrases lose the substance.<br>
• <b>Speaking:</b> use the concepts in daily language — "that’s a sunk cost", "what’s your crux?" — so they shape thought. Naturalized jargon as installed software.<br>
• <b>Workshop:</b> rationality is a performance skill; it must be deliberately practiced, drilled, coached — reading about deadlifts builds no muscle. (This app’s spine.)<br>
• <b>Object-Level:</b> microdose the meta; spend the hours on real work and real productivity. The failure mode to avoid is thinking about rationality too much. (The 5-minute day, the workday-sized drills.)<br>
• <b>Feedback-loop:</b> whatever you practice, instrument it — no measurement, no learning. (Your TAP audits, Brier scores, fudge ratios.)<br>
• <b>Idiosyncratic:</b> eventually, ditch everyone’s curriculum — including this one — and build YOUR art. Following role models forever is its own irrationality.</p>
<div class="key">Each attitude names a failure mode of the others, and each is somewhere right. A practice using only one goes stale; a practice ignoring one usually has a hole shaped exactly like it.</div>`,
quiz:[
{q:'Your practice consists entirely of reading LessWrong deeply and discussing it in precise jargon. Per the attitudes map, which critiques apply most directly?',opts:[
['The Workshop and Object-Level critiques: concepts without drills build no skill, and meta without object-level work changes no outcomes',1,'Yes — Reading+Speaking without practice is the classic hole. (The reverse hole exists too: drilling without theory re-invents wheels badly.)'],
['The Reading critique: you have not read enough',0,'Reading more deepens the same groove. The missing dimensions are practice and real-world contact, not corpus volume.'],
['No critique applies; that is complete practice',0,'Every single-attitude practice has a hole shaped like the missing attitudes — that is the central claim of the taxonomy.']]},
{q:'What does the Feedback-loop attitude add that pure Workshop-attitude drilling lacks?',opts:[
['More repetitions',0,'Volume is the Workshop attitude’s own currency. The addition is orthogonal to volume.'],
['Measurement: without tracked outcomes you cannot tell practice from ritual',1,'Right — drills can feel productive while teaching nothing. Brier scores, TAP audits, and fudge ratios are what make the difference detectable.'],
['Better teachers',0,'Coaching quality matters but is still Workshop-internal. The distinctive addition is instrumentation.']]}],
cards:[
['Name 6+ attitudes about applied rationality','Basics, Reading (+ Maths), Speaking, Workshop, Object-Level, Idiosyncratic, Feedback-loop. Each names a failure mode of the others.'],
['Workshop attitude — central claim','Rationality is a performance skill: it must be deliberately practiced and drilled, not just read about. Reading about deadlifts builds no muscle.'],
['Object-Level attitude — central claim','Spend your hours on real work; microdose the meta. Failure mode to avoid: thinking about rationality instead of living effectively.']],
},

{ id:'u14c2', icon:'🗣️', title:'Naturalize, then teach', kind:'field',
teach:`<p>The Speaking attitude’s test, inverted: you have not internalized a concept until you can deploy it <b>without its jargon</b>. "Crux" and "felt shift" are handles for you — but the skill is the thing, not the word.</p>
<p>Also Feynman’s test: teaching a thing to someone outside the culture is the fastest way to discover which parts you actually understand.</p>`,
mission:{text:`<b>Field mission:</b> this week, in a real conversation, help someone think through a real problem of theirs using ONE technique from this app — WITHOUT using any rationalist jargon and without lecturing. (E.g., walk them into goal-factoring by asking "what does the meeting actually get you?") Report: the technique, how you translated it, what they said, and what the translation taught you about your own understanding.`,
placeholder:'Technique: ...\nHow I phrased it jargon-free: ...\nWhat happened: ...\nWhat I learned about my own grasp: ...'},
rubric:['Real conversation, real problem belonging to the other person','Zero jargon; technique fully translated into plain questions/moves','Helped them think rather than performing knowledge at them','Honest reflection on which parts of the technique the author discovered they only half-knew'],
cards:[
['Naturalization test for a concept','You can deploy it in plain language on a live problem, without its jargon. The word is a handle; the skill is the thing.']],
},

{ id:'u14c3', icon:'⚒️', title:'Forge your own hammer', kind:'drill',
teach:`<p>Hammertime’s Final Exam, faithfully: the course ends by making you the toolsmith. Design <b>one original rationality technique</b> — yours, fitted to YOUR characteristic failure-shape (you identified it at the strategic level, Unit 13).</p>
<p>A real technique has: a trigger condition (when to run), a procedure (steps a tired person can follow), a mechanism story (why it should work, in terms of the machinery from these 14 units), and a test (how you will know within two weeks whether it works — Feedback-loop attitude, always).</p>
<div class="key">It does not need to be novel to humanity. It needs to be true to your bugs and actually run. Most published techniques started as someone’s personal patch.</div>`,
drill:{prompt:`Design one original technique for your characteristic failure-shape. Report: (a) the failure-shape with ledger evidence, (b) name + trigger + procedure (numbered steps), (c) mechanism — why this should work given what you know from this curriculum, (d) the 2-week test you will run, with a measurable signal.`,
placeholder:'Failure-shape: ... (evidence: bugs #...)\nTechnique "...": when [trigger], do 1)... 2)... 3)...\nMechanism: ...\nTest: for 2 weeks, measure ...',min:15},
rubric:['Failure-shape is evidenced from the author’s own ledger/audits, not generic','Procedure is executable by a tired person (concrete trigger, short numbered steps)','Mechanism story uses real machinery (noticing, TAP wiring, simulator queries, friction, felt senses...) coherently','Two-week test has a genuine measurable signal and a date'],
cards:[],
},

{ id:'u14c4', icon:'🎓', title:'Design your ongoing practice', kind:'checkin',
teach:`<p>Graduation = the app stops being your curriculum and becomes your gym equipment. Final standing practice, replacing nothing and reviewing everything: a <b>weekly practice review</b>.</p>
<p>Each week, 10 minutes: Which habits (Bug Hunt, Resolve, TAP audit, Design, forecasts, time predictions) are alive? Which became ritual without signal — and should be paused honestly rather than zombie-maintained? What does your ledger say your life needs MORE of next week — and what is the Idiosyncratic move: the thing no curriculum assigned you that you know you should practice?</p>
<div class="key">A practice you chose, sized to your real weeks, instrumented, and revised on schedule — that is the end state every attitude agrees on. The streak was scaffolding. The looking is the building.</div>`,
checkin:{key:'practice',label:'Practice Review',icon:'🎓',every:168,
ask:'Weekly: which standing practices are alive vs ritual? Pause zombies honestly. What does your ledger say next week needs more of? Name one self-assigned (Idiosyncratic) practice element.',
form:'report'},
cards:[
['What is the graduation end-state of this curriculum?','A self-chosen, instrumented, weekly-revised practice sized to your real life — with you as the toolsmith. The app becomes equipment, not curriculum.']],
},
]},
);

const SECTION2=[

{ id:'s2u1', icon:'🎾', color:'var(--green)', title:'The Inner Game', sub:'Gallwey: get out of your own way',
  source:[['Book: The Inner Game of Tennis (Gallwey)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'s2u1c1', icon:'🗣️', title:'Self 1 and Self 2', kind:'learn',
teach:`<p>Timothy Gallwey coached tennis and noticed the real opponent was internal. Every performer contains two characters: <b>Self 1</b>, the verbal teller — instructing, criticizing, worrying — and <b>Self 2</b>, the doer: the embodied intelligence that has actually learned the skill.</p>
<div class="key">Gallwey’s equation: <b>performance = potential − interference</b>. Most improvement available to an adult is not adding skill but removing Self 1’s interference — the tightening, the mid-action commentary, the flinch after errors.</div>
<p>Watch for Self 1’s signature moves: instructing yourself DURING execution ("bend the elbow!"), replaying an error while the next moment is already arriving, and trying so hard that muscles unrelated to the task contract.</p>
<div class="ex"><b>Beyond tennis:</b> Self 1 narrates your job interviews ("that answer was bad, fix it, you sound nervous") while Self 2 was perfectly capable of holding a conversation — it has done so daily for decades. The narration IS the nervousness.</div>
<p>This is Unit 1 of Section 1 again, at a deeper layer: noticing — but now the target is the noticer’s own interference.</p>`,
quiz:[
{q:'Per Gallwey, why do adults improve more by removing interference than by adding technique?',opts:[
['Because technique cannot be taught to adults',0,'Adults learn technique fine. The point is that Self 2 usually already knows more than it is allowed to express — Self 1’s commentary is what blocks it.'],
['Because performance = potential − interference, and Self 2’s potential is usually already higher than what shows',1,'Right. The tightening, mid-action instructions, and error-replay subtract from a capacity that is already there.'],
['Because trying harder always helps',0,'Backwards — over-trying is one of Self 1’s main interference patterns: contracting muscles and attention that the task never needed.']]},
{q:'You make an error in a presentation and spend the next 30 seconds internally replaying it. What is this, in Inner Game terms?',opts:[
['Useful immediate feedback processing',0,'Feedback review has its place — AFTER the performance. Mid-performance replay is Self 1 stealing attention from the only moment that can still be played: this one.'],
['Self 1 interference: attention taken from the live moment to feed judgment',1,'Exactly. The error already happened; the replay subtracts from what happens next. Note it, return to the ball.'],
['Self 2 learning from the mistake',0,'Self 2 learns through experience and observation, not through verbal self-flagellation. The replay is the critic, not the learner.']]}],
cards:[
['Self 1 vs Self 2 (Gallwey)','Self 1: the verbal teller — instructs, criticizes, worries during execution. Self 2: the embodied doer that actually learned the skill. Interference = Self 1 obstructing Self 2.'],
['Gallwey’s performance equation','Performance = potential − interference. Adult improvement mostly = removing interference, not adding technique.'],
['Three signature Self 1 moves','Instructing yourself DURING execution, replaying errors while the next moment arrives, over-trying (contracting muscles/attention the task never needed).']],
},

{ id:'s2u1c2', icon:'👀', title:'Non-judgmental awareness', kind:'drill',
teach:`<p>Gallwey’s replacement for self-instruction is <b>non-judgmental awareness</b>: observe the facts of performance with the neutrality you would give someone else’s. Not "my emails are rambling again, I am hopeless" but "this email has four topics; my finger hovers before every send."</p>
<p>The paradox that makes the method work: <b>observed behavior changes on its own</b>. When attention rests on what IS happening — without a fix-it agenda — Self 2 adjusts automatically, the way you never consciously computed how to catch a ball.</p>
<div class="key">Judgment is not evaluation. You may still evaluate outcomes later (Feedback-loop attitude demands it). What is banned is the mid-action verdict — the "good/bad" that tightens the system while it runs.</div>
<p>Gallwey anchored attention on neutral facts ("watch the seams of the ball"). Your version: pick a routine skilled activity today and choose one neutral fact of it to watch.</p>`,
drill:{prompt:`Run one non-judgmental awareness session (10+ min) on a routine skilled activity you will really do today — writing, cooking, speaking in a meeting, coding, sport. Pick ONE neutral observable (your pace, pauses, breath, word choice, posture). Report: (a) activity + observable, (b) 3-4 pure observations (facts, zero verdicts), (c) any Self 1 verdicts that intruded and what pulled you back, (d) whether anything changed without being "fixed".`,
placeholder:'Activity: ... Observable: ...\nObserved: ...\nSelf 1 intrusions: ...\nChanges: ...',min:10},
rubric:['Real activity actually performed with the awareness frame','Observations are neutral facts, not disguised judgments ("too slow" is a verdict; "each paragraph took ~4 min" is a fact)','Self 1 intrusions honestly logged rather than claimed absent','Any spontaneous change reported without inflation — "nothing changed" is an acceptable finding'],
cards:[
['Non-judgmental awareness — the method','Observe neutral FACTS of your own performance mid-action (pace, breath, pauses), no verdicts. Observed behavior self-corrects via Self 2.'],
['Judgment vs evaluation (Inner Game)','Evaluation of outcomes afterwards: required (feedback loops). Mid-action good/bad verdicts: banned — they tighten the system while it runs.']],
},

{ id:'s2u1c3', icon:'🤲', title:'Trusting Self 2', kind:'drill',
teach:`<p>The third Inner Game skill is <b>trust</b>: giving Self 2 the goal and then — this is the hard part — <i>not helping</i>.</p>
<p>Gallwey’s protocol: (1) hold a clear image of the desired OUTCOME (the ball landing deep, the paragraph reading warmly, the difficult point made kindly); (2) let go of instructions about HOW; (3) allow execution; (4) observe results without judgment and re-image.</p>
<div class="key">Trust is not recklessness — you only extend it to skills Self 2 has actually trained. You do not "trust" a first-ever piano piece. You trust the conversation you have had ten thousand times, the writing you do daily, the walk to the net.</div>
<div class="ex"><b>Example:</b> Before a tense one-on-one, Rana pictures the ending she wants — both people relaxed, the issue named without heat — then walks in with no script. Her trained conversational Self 2, unscripted, reads the room better than any plan survived contact with it.</div>`,
drill:{prompt:`Run the trust protocol on ONE trained skill in a real situation today or tomorrow: (a) name the skill and why Self 2 has earned trust there (evidence of training), (b) the outcome image you held — sensory, specific, (c) what "not helping" felt like and where Self 1 grabbed the wheel anyway, (d) result vs the usual scripted/controlled attempt.`,
placeholder:'Skill: ... (trained: ...)\nOutcome image: ...\nLetting go felt: ... Self 1 grabbed at: ...\nResult: ...',min:8},
rubric:['Skill is genuinely trained (trust is earned, not wished)','Outcome image is specific and sensory, not an abstract goal','Honest report of Self 1 interference during the attempt','Fair comparison to baseline; no claim of magic where there was none'],
cards:[
['The trust protocol (Inner Game)','1) Hold a specific sensory image of the OUTCOME. 2) Release instructions about HOW. 3) Execute. 4) Observe without judgment, re-image.'],
['When is trusting Self 2 legitimate?','Only on trained skills — trust is extended to demonstrated competence, not wished into existence. Daily conversation: yes. First piano recital: no.']],
},

{ id:'s2u1c4', icon:'📓', title:'The interference log', kind:'checkin',
teach:`<p>Standing practice for this section: <b>one interference catch per day.</b> Somewhere in your real day, Self 1 will instruct, replay, or over-try. Catch it once, log it in one line: the situation, the interference move, what Self 2 was mid-doing.</p>
<div class="key">This is the flinch-log of Section 1 pointed inward at performance. Over weeks it maps YOUR characteristic interference profile — most people discover they are heavy in one move (replayers vs instructors vs over-triers), and the counter-move differs for each.</div>`,
checkin:{key:'interference',label:'Interference Log',icon:'🎾',every:24,
ask:'Log one Self 1 interference caught today: situation, the move (instructing / replaying / over-trying), and what Self 2 was doing at the time.',
form:'report'},
cards:[
['The three interference profiles','Instructors (mid-action how-to commentary), Replayers (error loops during live moments), Over-triers (recruiting effort/muscles the task never needed). Counter-moves differ per profile.']],
},
]},

{ id:'s2u2', icon:'🎭', color:'var(--orange)', title:'Status & Spontaneity', sub:'Johnstone: the games under every conversation',
  source:[['Book: Impro (Keith Johnstone)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'s2u2c1', icon:'♟️', title:'Status is something you do', kind:'learn',
teach:`<p>Keith Johnstone’s acting classes were flat until he asked actors to make their status slightly higher or lower than their partner’s. Scenes instantly became "authentic". His discovery: <b>every exchange is a status transaction</b>, and status is not a rank you have — it is <b>something you do</b>, moment to moment, mostly unconsciously.</p>
<h4>The micro-moves</h4>
<p>• <b>Raising own:</b> holding eye contact, stillness, taking time before replying, complete sentences, taking space.<br>• <b>Lowering own:</b> touching your face/hair, "er" and hedges, quick agreement, laughing at your own remarks, moving out of the way.<br>• <b>Lowering other’s:</b> interrupting, topping their story, glancing at your phone.<br>• <b>Raising other’s:</b> letting their point land in silence, asking a follow-up, physically turning toward them.</p>
<div class="key">Johnstone’s liberating claim: since status is behavior, it is <i>practicable</i>. Most people are stuck in a preferred position (habitual high or habitual low) and play it even when it serves them badly. Flexibility — choosing the move — is the skill.</div>
<div class="ex"><b>Example:</b> In reviews, Sam (habitual low) prefixes every idea with "this is probably stupid but". The ideas are good; the packaging pre-lowers them. One removed hedge per meeting is a status rep.</div>`,
quiz:[
{q:'Johnstone’s core reframe of status is:',opts:[
['Status is your position in the org chart',0,'That is rank. Johnstone’s point is precisely that a janitor can play high and a CEO low — the transaction is behavioral and moment-to-moment.'],
['Status is something you DO — a stream of micro-behaviors — and therefore practicable',1,'Yes. Eye contact, hedges, interruptions, stillness: doings, not havings. Which means the stuck patterns can be retrained.'],
['Status should be eliminated from healthy interactions',0,'Impossible, per Johnstone — the transactions happen anyway. The choice is between playing them blind or seeing them.']]},
{q:'Which set contains only OWN-status-lowering moves?',opts:[
['Interrupting, topping their story, phone-glancing',0,'Those lower the OTHER’s status — a different (and more aggressive) family of moves.'],
['Face-touching, hedging ("this might be dumb but"), laughing at your own remarks',1,'Right — Johnstone’s classic self-lowering set. Fine when chosen (it can put people at ease); costly when it is an unconscious default.'],
['Stillness, held eye contact, unhurried replies',0,'These RAISE own status. Notice how physical the list is — status lives in the body more than the words.']]}],
cards:[
['Status (Johnstone) — definition','Not a rank you have but something you DO: a stream of micro-behaviors (eye contact, hedges, stillness, interruptions) in every exchange. Therefore practicable.'],
['4 families of status moves','Raise own (stillness, held gaze, unhurried speech) / lower own (hedges, face-touching, self-laughter) / lower other’s (interrupting, topping, phone) / raise other’s (silence for their point, follow-ups, turning toward).'],
['What is status FLEXIBILITY and why is it the skill?','Most people are stuck playing habitual high or low even when it hurts them. The trained skill is seeing the transaction and choosing the move.']],
},

{ id:'s2u2c2', icon:'🔬', title:'Status field work', kind:'field',
teach:`<p>Two-part mission, straight from Johnstone’s classroom to your real week.</p>
<p><b>Part 1 — See it (observer):</b> in one real meeting or gathering, watch the status transactions for 10 minutes. Who lowers themselves before speaking? Who tops? What does the highest-played person do with their body?</p>
<p><b>Part 2 — Move it (one notch):</b> in a LOW-stakes interaction, deliberately play one notch off your habitual position. Habitual low? Hold one opinion without a hedge, let one silence sit. Habitual high? Ask a follow-up question and let someone else’s story win. <b>One notch.</b> This is CoZE with a status hypothesis: predict the reaction before, observe after.</p>
<div class="key">Ethics note: this is practice in awareness and flexibility, not manipulation. You are learning to stop playing moves you never chose — the honest version of yourself needs the full keyboard.</div>`,
mission:{text:`<b>Field mission:</b> (1) Observe 10 min of real status transactions — log 3 concrete moves you saw (who, what, effect). (2) Play one notch off your habitual status in a low-stakes real interaction — record your prediction beforehand, what you did, and what actually happened.`,
placeholder:'Observed: 1)... 2)... 3)...\nMy habitual position: ...\nOne-notch experiment — predicted: ... did: ... happened: ...'},
rubric:['Three observed moves are concrete and behavioral (not "he seemed dominant" but what he DID)','Own habitual position identified honestly','Experiment was one notch, low-stakes, actually performed','Prediction recorded before; outcome compared after (CoZE discipline)'],
cards:[
['The one-notch rule for status practice','Shift a single notch off your habitual position in low-stakes settings. Big jumps read as bizarre and teach nothing; one notch is visible in the data and safe.']],
},

{ id:'s2u2c3', icon:'🎁', title:'Offers: accept, don’t block', kind:'drill',
teach:`<p>Johnstone’s second engine: every thing a partner says or does is an <b>offer</b>. You can <b>accept</b> it (take it in and build on it) or <b>block</b> it (deny, deflect, ignore — anything that kills where it was going). Improvisers who block feel safe and are boring; improvisers who accept look brave and brilliant, and mostly they are just <i>not blocking</i>.</p>
<p>Off stage, blocking wears clever disguises: "yes, but…", answering a different question than the one asked, meeting a colleague’s idea with its first flaw, replying to vulnerability with advice.</p>
<div class="key">Accepting ≠ agreeing. You can accept the offer "I think this plan is wrong" — take it seriously, build on it, ask what they see — while still disagreeing. What you do not do is make the offer disappear.</div>
<div class="ex"><b>Example:</b> Child: "Look, my drawing!" Block: "Nice. Dinner in five." Accept: "Ooh — why is the sun purple?" The cost was four seconds. The difference compounds for years — with children, colleagues, and spouses alike.</div>`,
drill:{prompt:`For one real conversation today (≥10 min), adopt the rule: accept every offer — build on what is actually given before adding your own direction. Report: (a) the conversation context, (b) 2-3 offers you caught and how you accepted them, (c) at least one block you caught yourself ABOUT to play (its disguise), (d) what the conversation did that your usual one would not have.`,
placeholder:'Context: ...\nOffers accepted: 1)... 2)...\nBlock I almost played: ... (disguised as ...)\nDifference: ...',min:8},
rubric:['Real conversation, rule genuinely attempted throughout','Offers identified are actual offers (things given), acceptances built on them specifically','Honest catch of at least one near-block with its disguise named','Comparison to baseline is concrete, not "it was nicer"'],
cards:[
['Offer / accept / block (Impro)','Everything a partner gives is an offer. Accept = take it in and build on it. Block = deny/deflect/ignore, killing where it was going. Blocking feels safe and is deadening.'],
['Accepting ≠ agreeing','You can fully accept the offer "your plan is wrong" — take it seriously, explore it — while disagreeing. The sin is making the offer disappear, not dissenting.'],
['Four disguises of everyday blocking','"Yes, but…", answering a different question, meeting ideas with their first flaw, replying to vulnerability with advice.']],
},

{ id:'s2u2c4', icon:'💡', title:'Be more obvious', kind:'drill',
teach:`<p>Johnstone found students paralyzed not by emptiness but by <b>censorship</b>: three answers arrive instantly and get rejected — too obvious, too weird, too revealing. His scandalous instruction: <b>"Be more obvious."</b> The obvious answer, delivered without the pause of self-censorship, reads as inspired — because it is <i>yours</i>, and connected to what came before.</p>
<p>The censor is Self 1 wearing a beret. It runs on three fears Johnstone names precisely: fear of being seen as unoriginal, as mad, or as <i>yourself</i>.</p>
<div class="key">Rationality relevance: the same censor that blocks improv blocks hypothesis generation, brainstorming, and honest answers to "what do you actually want?" — the Focusing sessions of Section 1 were fighting it too. Spontaneity is trainable trust in your first material.</div>`,
drill:{prompt:`Run a 5-minute Yoda-timer spontaneity rep on a REAL open question of yours (from your ledger or Hamming chapter): write continuously, accepting your first thought every time — obvious, weird, or revealing — zero editing. Then report: (a) the question, (b) how many times the censor fired and which fear it used (unoriginal / mad / myself), (c) one thing in the output that surprised you, (d) honest verdict: any material worth keeping?`,
placeholder:'Question: ...\nCensor fired ~x times, mostly the fear of: ...\nSurprise: ...\nKeep: ...',min:6,timer:5},
rubric:['Continuous uncensored writing actually attempted on a real question','Censor events counted and their fear-type identified','A genuine surprise reported (surprise is the signature of beating the censor)','Sober assessment of the material — spontaneity produces ore, not finished metal'],
cards:[
['"Be more obvious" (Johnstone)','The first, obvious answer delivered without censorship reads as inspired — it is connected and yours. Cleverness-seeking is the censor talking.'],
['The censor’s three fears','Being seen as unoriginal, as mad, or as yourself. Same censor blocks improv, brainstorming, and honest introspection.']],
},
]},

{ id:'s2u3', icon:'📦', color:'var(--purple)', title:'Out of the Box', sub:'Warner: self-deception and the people around you',
  source:[['Book: Bonds That Make Us Free (C. Terry Warner)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'s2u3c1', icon:'🪤', title:'Self-betrayal', kind:'learn',
teach:`<p>C. Terry Warner’s deep claim: much of our misery with other people begins with an act against ourselves. A <b>self-betrayal</b> is failing to act on a sense you had about what another person needed — you saw your partner exhausted and felt the pull to take over dinner, and didn’t.</p>
<p>What happens next is the engine: needing to feel justified, <b>your perception itself bends</b>. Their tiredness starts looking like theatrics; your inaction starts looking like fairness ("I worked all day too"; "she never asks properly"). Warner calls this state being <b>in the box</b>: a self-justifying stance from which the other person appears as an object — an obstacle, a vehicle, or an irrelevance — rather than a person.</p>
<div class="key">The epistemics is the point for us: in the box, <b>you are motivated to be provoked</b>. You need them to be as bad as your story requires. This is a bias factory running on relationship fuel — no calibration training touches it, because the distortion arrives disguised as perception, not as inference.</div>`,
quiz:[
{q:'What is a self-betrayal, in Warner’s precise sense?',opts:[
['Any failure to meet your own goals',0,'That is ordinary akrasia — Section 1’s territory. Warner’s term is specifically relational: a sense of what another needed, unacted-on.'],
['Failing to act on your own sense of what another person needed',1,'Right — and the sequel is the engine: the need to feel justified bends your perception of them until your inaction looks reasonable.'],
['Betraying a secret',0,'Unrelated. The betrayed party in Warner’s concept is your own moral sense.']]},
{q:'Why does Warner’s "box" matter epistemically, not just morally?',opts:[
['Because being kind is rational',0,'Maybe, but the specific claim is sharper: the box corrupts perception itself, upstream of any reasoning.'],
['Because in the box you are MOTIVATED to be provoked — you need the other person to be as bad as your justification requires',1,'Exactly. It is a bias factory disguised as seeing: their neutral acts arrive pre-interpreted as evidence for your story.'],
['Because boxes make you less productive',0,'Downstream at best. The core damage is to the accuracy of your read of another human — data you act on daily.']]}],
cards:[
['Self-betrayal (Warner)','Failing to act on your own sense of what another person needed. The seed of the box.'],
['The box — mechanism','After self-betrayal, the need for justification bends perception: their faults inflate, your virtues inflate, they become an object (obstacle/vehicle/irrelevance) in your story.'],
['Why the box defeats ordinary debiasing','The distortion arrives disguised as perception ("I SEE she is being dramatic"), not as an inference you could audit. You are motivated to be provoked.']],
},

{ id:'s2u3c2', icon:'🔄', title:'Collusion', kind:'learn',
teach:`<p>Boxes interlock. My in-the-box behavior toward you — the sigh, the clipped answers, the scorekeeping — <i>gives you real evidence</i> for your box about me. Your resulting coldness gives me mine. Warner calls this <b>collusion</b>: two people cooperating perfectly to give each other cause.</p>
<p>The signature of collusion is that <b>both parties are right about the facts and wrong about the story</b>. Yes, he really is curt with you. Yes, you really do avoid him. Each dossier is accurate; each was partly manufactured by its collector.</p>
<div class="key">Warner’s hard question, and this section’s crux: <i>would you rather be right, or be free?</i> In the box, being right is winning — and the game it wins keeps you exactly where you are. Escape is not "acting nicer" (in-the-box niceness reads as fake, because it is a move in the same game). Escape is upstream: honoring the sense you betrayed, at which point the other person turns back into a person on their own.</div>
<div class="ex"><b>Example:</b> A classic couple’s loop: he withdraws because she criticizes; she criticizes because he withdraws. Two accurate dossiers, one machine. The first person to act OUT of the box — not nicer, but actually seeing the other’s burden — usually finds the machine was running on their fuel too.</div>`,
quiz:[
{q:'The signature of collusion is:',opts:[
['One person is lying about the facts',0,'Rarely needed. Collusion’s trap is precisely that no one has to lie — both dossiers are factually accurate.'],
['Both parties are right about the facts and wrong about the story — each partly manufactured the evidence they collect',1,'Yes. His curtness is real; your avoidance is real; each is fuel the other’s box produced. Accuracy of facts, corruption of narrative.'],
['Both people secretly want the conflict',0,'Not consciously — that is what makes it stable. Each experiences themselves as the reasonable one responding to provocation.']]},
{q:'Why does "just act nicer" fail to break collusion, per Warner?',opts:[
['Niceness rewards bad behavior',0,'Not the mechanism. The problem is where the niceness comes from, not what it rewards.'],
['In-the-box niceness is a move in the same game — the other person feels it as fake because it IS strategic',1,'Right. The box is a stance, not a behavior set. Escape happens upstream: honoring the betrayed sense, after which the other reappears as a person — and behavior changes for real.'],
['Nice actions take too long to work',0,'Speed is not the issue; sourcing is. Out-of-the-box acts often work startlingly fast.']]}],
cards:[
['Collusion (Warner)','Interlocking boxes: my in-the-box behavior gives you real evidence for your box, and yours gives me mine. Two accurate dossiers, one self-sustaining machine.'],
['"Right about facts, wrong about the story"','Collusion’s signature: no one needs to lie. Each party’s evidence is real AND partly manufactured by their own box’s provocations.'],
['Why escape is upstream of behavior','Acting nicer from inside the box reads as fake (it is a move in the same game). The exit is honoring the originally betrayed sense — the stance change that makes real behavior change possible.']],
},

{ id:'s2u3c3', icon:'🔍', title:'Box audit', kind:'drill',
teach:`<p>Time to look at one of yours. Choose a real, currently strained relationship — colleague, family, friend. Not your heaviest (this is a first audit, choose a 5/10, not the 10/10), and note this is about ordinary friction between roughly-well-meaning people — <b>not</b> about relationships involving abuse or safety, which deserve better tools than a self-audit.</p>
<p>The audit questions, in Warner’s order:</p>
<p>1. What do I find myself constantly proving about them, or about me? (The justification names the box.)<br>2. Can I locate an original sense-unacted-on — something I felt I should do or say and did not?<br>3. What do I need them to keep being, for my story to hold? What evidence do I collect with special appetite?<br>4. When I imagine them as a person carrying their own load — what comes into view that the dossier omits?</p>
<div class="key">Your Focusing and IDC skills are the instruments here; the box audit is those skills pointed at relational perception. Expect resistance — the box defends itself by making the audit feel unnecessary ("this is different, they really ARE like that"). That feeling is question 3 answering itself.</div>`,
drill:{prompt:`Run the four audit questions on one real strained relationship (a 5/10, not a 10/10; nothing involving safety). Report at whatever detail you are comfortable — the mechanics matter more than the specifics: (a) what you keep proving, (b) the original unacted-on sense if you found one, (c) what your story needs them to keep being + the evidence you collect with appetite, (d) what appeared when you imagined them carrying their own load, (e) any resistance the audit itself produced.`,
placeholder:'Proving: ...\nOriginal sense unacted-on: ...\nStory needs them to be: ... I collect: ...\nSeen as a person: ...\nResistance felt: ...',min:15},
rubric:['Appropriately-sized relationship chosen (5/10, no safety issues)','Justification pattern identified concretely (what is being proven)','Honest attempt at locating a self-betrayal, or honest report of not finding one','Question 4 actually attempted — something the dossier omits was seen','Resistance acknowledged as data rather than obeyed or denied'],
cards:[
['The four box-audit questions','1) What do I keep proving? 2) Original sense-unacted-on? 3) What must they keep being for my story — what evidence do I collect with appetite? 4) What appears when they are a person carrying their own load?'],
['"This is different, they really ARE like that"','The box defending itself — the feeling that the audit is unnecessary is question 3 answering itself. Treat as data, not verdict.']],
},

{ id:'s2u3c4', icon:'🕊️', title:'One out-of-the-box act', kind:'field',
teach:`<p>Warner is clear that the box is not exited by insight alone — the exit is an <b>act</b>: doing the thing your recovered sense says, without scorekeeping, without watching for credit.</p>
<div class="key">Constraints that keep it honest: it must be small, concrete, this week, and — the hard one — <b>not performed AT them</b>. If part of you is watching their reaction for vindication ("see, I even did X and they STILL…"), that is the box wearing a halo. The act is complete when done, whatever they do with it.</div>
<p>"Nothing changed in them" is a fully successful outcome. The claim under test is about what changes in your seeing, not in their behavior.</p>`,
mission:{text:`<b>Field mission:</b> from your box audit, identify one small concrete act your recovered sense points to — and do it this week, not-at-them, no scorekeeping. Report: the act, how you kept it from becoming a performance, what happened in YOUR perception of them afterwards (their reaction is optional data, not the metric).`,
placeholder:'Act: ...\nKept honest by: ...\nMy perception after: ...\n(Their reaction, if any: ...)'},
rubric:['Act is small, concrete, actually done this week','Sourced from the audit’s recovered sense, not from strategy','Honest handling of the credit-watching temptation','Success measured in the author’s perception shift, with "their reaction" correctly demoted to optional data'],
cards:[
['The out-of-the-box act — constraints','Small, concrete, this week, and not performed AT them: no scorekeeping, no watching for vindication. Complete when done, whatever they do.'],
['What metric does an out-of-the-box act target?','Your own perception (do they reappear as a person?), NOT their behavior. "Nothing changed in them" can be full success.']],
},
]},

{ id:'s2u4', icon:'🧘', color:'var(--teal)', title:'Performing Under Fire', sub:'Integration: Againstness and the daily rep',
  source:[['CFAR Handbook: Againstness','https://www.rationality.org/resources/handbook']],
  chapters:[

{ id:'s2u4c1', icon:'🌡️', title:'Againstness', kind:'learn',
teach:`<p>CFAR’s <b>Againstness</b> names what this whole section keeps circling: the state of being physiologically <i>against</i> — sympathetic activation during disagreement or evaluation. Tight jaw, fast shallow breath, forward pressure, the felt need to win the next sentence.</p>
<p>In that state: Self 1 grabs the controls (Inner Game), you play compulsive status instead of chosen status (Impro), and the box gets its fuel (Warner). One physiological switch, three failure modes.</p>
<h4>The CFAR de-escalation moves</h4>
<p>1. <b>Notice and name it, out loud if possible</b> — "I notice I’m getting defensive" drops the temperature astonishingly well (and is a high-status move, in Johnstone’s sense: only secure players can afford it).<br>2. <b>Change the body first:</b> exhale longer than you inhale, unclench, lean back, slow down — the mind follows the posture more readily than the reverse.<br>3. <b>Re-aim at the territory:</b> say the other position accurately (ideological Turing test, live). Againstness cannot fully survive genuinely trying to see it.</p>
<div class="key">This is the performance layer under Double Crux: the technique fails in bodies that are against. Fix the state, then the epistemics gets to happen.</div>`,
quiz:[
{q:'Why does CFAR say to change the body FIRST when caught in againstness?',opts:[
['Because posture is easier to fake',0,'Not fakery — physiology. The claim is causal: state drives cognition, and the body is the accessible handle on state.'],
['Because sympathetic activation drives the cognition, and breath/posture are the levers you can actually pull mid-conversation',1,'Right. You cannot argue yourself calm nearly as fast as you can exhale yourself calm. Mind follows body here.'],
['To signal dominance',0,'Backwards — the moves are de-escalating (lean back, slow down), and naming your own defensiveness is disarming, not dominating.']]}],
cards:[
['Againstness (CFAR)','Sympathetic activation during disagreement/evaluation: tight jaw, shallow breath, need to win the next sentence. The state under Self 1 takeovers, compulsive status, and box-fueling.'],
['Three de-escalation moves','1) Notice and NAME it (aloud works best). 2) Body first: long exhale, unclench, lean back, slow down. 3) Re-aim at territory: state their position accurately, live.'],
['Why Double Crux needs Againstness work','The technique fails in bodies that are against — fix the physiological state first, then the epistemics can happen.']],
},

{ id:'s2u4c2', icon:'🎪', title:'The daily performance rep', kind:'checkin',
teach:`<p>Section 2’s standing practice, replacing nothing: <b>one deliberate performance rep every 3 days</b>, rotating through the section’s repertoire —</p>
<p>• an Inner Game rep (non-judgmental awareness or trust protocol on a real task),<br>• a status rep (one-notch experiment or one hedge deliberately dropped),<br>• an offers rep (one conversation on accept-everything),<br>• an out-of-the-box act, or a live Againstness recovery.</p>
<div class="key">Rotate honestly — the rep you keep avoiding is the one carrying your growth (you know this from Aversion Factoring). Log which type, what you did, what you observed.</div>`,
checkin:{key:'performrep',label:'Performance Rep',icon:'🎭',every:72,
ask:'One deliberate rep from the Performer repertoire (Inner Game / status / offers / out-of-box / Againstness recovery) — rotate types, and note if you are avoiding one. Report type, what you did, what you observed.',
form:'report'},
cards:[
['The Performer repertoire (rotation)','Inner Game rep, status one-notch rep, offers/accept rep, out-of-the-box act, live Againstness recovery. The avoided one carries the growth.']],
},
]},
];

// ===================== SECTION 3: THE MATHEMATICIAN =====================
const SECTION3=[

{ id:'s3u1', icon:'⚖️', color:'var(--gold)', title:'Bayes as a Reflex', sub:'Odds, evidence, and honest updating',
  source:[['Read the Sequences: highlights','https://www.lesswrong.com/highlights'],['Arbital: Bayes guide','https://arbital.com/p/bayes_rule/?l=1zq']],
  chapters:[

{ id:'s3u1c1', icon:'🎚️', title:'Odds and the likelihood ratio', kind:'learn',
teach:`<p>Bayes becomes usable in daily life the moment you switch to <b>odds form</b>: <b>posterior odds = prior odds × likelihood ratio</b>. Three numbers, one multiplication, no denominators.</p>
<p>The <b>likelihood ratio (LR)</b> of a piece of evidence is: how probable is this observation if the hypothesis is TRUE, divided by how probable if FALSE. LR = 3 means "this is 3× more expected under H." LR near 1 means the dramatic-feeling evidence is <i>noise</i>.</p>
<div class="ex"><b>Example:</b> "Marc hasn’t answered my message in 6 hours — he’s angry at me." Prior odds he’s angry: maybe 1:10. LR of a 6-hour silence: he answers slowly all the time (P≈0.5 if angry, P≈0.4 if not) → LR ≈ 1.25. Posterior ≈ 1:8. The evidence that FELT damning moved you barely at all — and now you can see that.</div>
<div class="key">The reflex to train: when evidence arrives, ask <i>"how surprising would this be if I were wrong?"</i> Evidence only counts to the degree the alternative world would NOT have produced it.</div>`,
quiz:[
{q:'A test result feels alarming. Its LR is 1.1. How much should you update?',opts:[
['A lot — alarming evidence demands action',0,'Feeling alarming and being diagnostic are different properties. LR 1.1 means both worlds produce this result almost equally often: it is nearly noise.'],
['Barely — LR near 1 means both hypotheses predict this observation about equally',1,'Right. Multiply your prior odds by 1.1: almost nothing moves. Drama is not diagnosticity.'],
['Fully to the alarming conclusion',0,'That is ignoring the prior AND the LR — the two things that determine what the evidence is worth.']]},
{q:'What is the everyday reflex this chapter installs?',opts:[
['Compute exact probabilities for everything',0,'Precision is optional; structure is the point. Rough odds and rough LRs already beat unstructured alarm.'],
['When evidence arrives, ask: how surprising would this be if my hypothesis were FALSE?',1,'Exactly — evidence counts only insofar as the alternative world would not have produced it. That one question is Bayes in a trench coat.'],
['Distrust all evidence',0,'Opposite direction — the goal is to weigh evidence correctly, which sometimes means updating hard.']]}],
cards:[
['Bayes in odds form','Posterior odds = prior odds × likelihood ratio. Three numbers, one multiplication.'],
['Likelihood ratio — definition + reflex question','LR = P(evidence | H true) ÷ P(evidence | H false). Reflex: "how surprising would this be if I were wrong?" LR≈1 → the evidence is noise however dramatic it feels.']],
},

{ id:'s3u1c2', icon:'🧾', title:'Update on real evidence', kind:'drill',
teach:`<p>Run the machine on something live. Pick a real uncertain belief from your week — "the client will sign", "my flatmate is annoyed", "this side project is viable" — and one piece of evidence that arrived recently.</p>
<div class="key">Two honesty checks while you work: (1) would you have counted the OPPOSITE observation as evidence for the same conclusion? If yes, your LR is corrupt. (2) After computing, compare with your gut’s verdict — divergence in either direction is interesting data.</div>`,
drill:{prompt:`Take one real uncertain belief + one recent piece of evidence. Report: (a) the belief and your prior odds (rough is fine), (b) the evidence and its LR — with the two conditional probabilities stated, (c) posterior odds, (d) the opposite-observation check, (e) computed result vs gut verdict.`,
placeholder:'Belief: ... Prior ~1:4\nEvidence: ... P(E|true)≈..., P(E|false)≈... → LR≈...\nPosterior ~...\nOpposite check: ...\nVs gut: ...',min:8},
rubric:['Belief and evidence are real and current','LR built from two explicit conditional probabilities, not vibes','Opposite-observation check performed honestly','Gut comparison reported, with curiosity rather than forcing agreement'],
cards:[
['The corrupt-LR test','Would you have counted the OPPOSITE observation as evidence for the same conclusion? If yes, your likelihood ratio is motivated, not measured.']],
},

{ id:'s3u1c3', icon:'🔮', title:'Conservation of expected evidence', kind:'learn',
teach:`<p>A theorem with teeth: <b>you cannot expect to update in a known direction.</b> If you already know tomorrow’s evidence will push you toward believing X, you should believe X more <i>now</i> — the expectation of your posterior must equal your prior.</p>
<p>Violations to catch in yourself:</p>
<p>• Planning to "look into it" while knowing what you’ll conclude — that’s not inquiry, that’s a ceremony.<br>• Treating confirmations as big updates and disconfirmations as small ones — the sizes are mathematically linked; you don’t get to choose both.<br>• "No evidence of a problem" after actually looking IS evidence of no problem — weak, but real. Absence of evidence is evidence of absence, proportional to how hard you looked.</div>
<div class="key">Field version: before checking anything (inbox, analytics, their reaction), state which outcome would surprise you and how much. If no outcome would move you, skip the check — you were seeking reassurance, not information.</div>`,
quiz:[
{q:'You plan to "do more research" on a decision, but you can already predict your conclusion. What does conservation of expected evidence say?',opts:[
['Research is always worth doing',0,'Not when its outcome is already known to you — then it produces zero expected update, only delay and ceremony.'],
['Update NOW to where you expect to end up; only research if the outcome could genuinely surprise you',1,'Right. Expected posterior = prior. Predictable research is reassurance-seeking wearing a lab coat.'],
['Never trust your predictions of your own conclusions',0,'Sometimes wise, but the theorem’s instruction is sharper: either the research can surprise you, or it cannot teach you.']]}],
cards:[
['Conservation of expected evidence','You cannot expect to update in a known direction: E[posterior] = prior. If you know where "more research" will land, update now and skip the ceremony.'],
['Absence of evidence','After genuinely looking, finding nothing IS evidence of absence — weak but real, proportional to how thorough the look was.']],
},
