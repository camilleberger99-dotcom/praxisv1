<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#10131c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Praxis">
<title>Praxis — Applied Rationality Dojo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%94%A8%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#10131c; --bg2:#181d2a; --card:#1e2433; --card2:#252c3f;
  --line:#2e3650; --txt:#e8ecf5; --dim:#9aa3bb; --faint:#5d6680;
  --green:#58cc7a; --green-d:#3da55c; --gold:#ffc94d; --red:#ff6b6b;
  --blue:#5fa8ff; --purple:#b98aff; --orange:#ff9d5c; --teal:#4dd6c1;
  --r:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.45; overscroll-behavior:none;}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
button{font-family:inherit;}
#app{max-width:560px;margin:0 auto;padding:12px 14px 24px;}
h1,h2,h3{line-height:1.25;}
a{color:var(--blue);}
.small{font-size:.82rem;color:var(--dim);}
.faint{color:var(--faint);}
.center{text-align:center;}

/* top bar */
#topbar{position:sticky;top:0;z-index:50;background:rgba(16,19,28,.93);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  max-width:560px;margin:0 auto;padding:10px 14px;border-bottom:1px solid var(--line);}
.stat{display:flex;align-items:center;gap:4px;font-weight:700;font-size:.95rem;}
.stat .ic{font-size:1.1rem;}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--bg2);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
#nav button{background:none;border:none;color:var(--faint);font-size:1.45rem;
  padding:4px 10px;border-radius:12px;position:relative;cursor:pointer;}
#nav button.on{color:var(--txt);background:var(--card2);}
#nav .badge{position:absolute;top:0;right:2px;background:var(--red);color:#fff;
  font-size:.62rem;font-weight:800;border-radius:9px;min-width:17px;height:17px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;margin:12px 0;}
.card h3{margin:0 0 6px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--green);color:#0c2616;border:none;border-radius:14px;
  padding:13px 22px;font-size:1rem;font-weight:800;cursor:pointer;width:100%;
  box-shadow:0 4px 0 var(--green-d);transition:transform .05s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-d);}
.btn.sec{background:var(--card2);color:var(--txt);box-shadow:0 4px 0 #181d2c;}
.btn.warn{background:var(--gold);color:#3a2c00;box-shadow:0 4px 0 #c79a2e;}
.btn.ghost{background:none;box-shadow:none;color:var(--dim);font-weight:600;}
.btn:disabled{opacity:.45;pointer-events:none;}
.btn.sm{width:auto;padding:8px 14px;font-size:.88rem;border-radius:11px;}
.row{display:flex;gap:10px;align-items:center;}
.row .btn{flex:1;}

/* path */
.unit-head{margin:26px 0 4px;padding:14px 16px;border-radius:var(--r);
  display:flex;align-items:center;gap:12px;border:1px solid var(--line);}
.unit-head .uic{font-size:1.7rem;}
.unit-head h2{margin:0;font-size:1.06rem;}
.unit-head .small{margin-top:2px;}
.path{display:flex;flex-direction:column;align-items:center;padding:6px 0;}
.node{width:74px;height:66px;border-radius:50% / 46%;display:flex;align-items:center;
  justify-content:center;font-size:1.65rem;margin:9px 0;cursor:pointer;border:none;
  background:var(--card2);box-shadow:0 6px 0 #141927;position:relative;transition:transform .05s;}
.node:active{transform:translateY(3px);box-shadow:0 2px 0 #141927;}
.node.done{background:var(--gold);box-shadow:0 6px 0 #b8860b;}
.node.next{background:var(--green);box-shadow:0 6px 0 var(--green-d);animation:pulse 1.6s infinite;}
.node.locked{opacity:.38;cursor:default;}
.node.checkin{border-radius:18px;}
.node .lbl{position:absolute;top:100%;margin-top:8px;font-size:.7rem;color:var(--dim);
  width:130px;text-align:center;left:50%;transform:translateX(-50%);line-height:1.2;}
.node.off-l{align-self:flex-start;margin-left:18%;}
.node.off-r{align-self:flex-end;margin-right:18%;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.gap-lbl{height:18px;}

/* lesson screen */
#sheet{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;display:none;}
#sheet.open{display:block;}
#sheet .inner{max-width:560px;margin:0 auto;padding:14px 16px 60px;}
#sheet .top{display:flex;align-items:center;gap:12px;position:sticky;top:0;
  background:var(--bg);padding:10px 0;z-index:5;}
#sheet .x{background:none;border:none;color:var(--faint);font-size:1.5rem;cursor:pointer;padding:4px;}
.prog{flex:1;height:12px;background:var(--card2);border-radius:8px;overflow:hidden;}
.prog>div{height:100%;background:var(--green);border-radius:8px;transition:width .3s;}
.teach{font-size:1.02rem;}
.teach p{margin:.7em 0;}
.teach .ex{background:var(--card);border-left:4px solid var(--purple);border-radius:8px;
  padding:10px 14px;margin:12px 0;font-size:.95rem;}
.teach .key{background:var(--card);border-left:4px solid var(--gold);border-radius:8px;
  padding:10px 14px;margin:12px 0;}
.teach h4{margin:1.1em 0 .3em;color:var(--gold);}

.opt{display:block;width:100%;text-align:left;background:var(--card);
  border:2px solid var(--line);border-radius:14px;padding:13px 15px;margin:9px 0;
  color:var(--txt);font-size:.97rem;cursor:pointer;}
.opt.sel{border-color:var(--blue);}
.opt.right{border-color:var(--green);background:#1c3325;}
.opt.wrong{border-color:var(--red);background:#3a2026;}
.fb{border-radius:14px;padding:13px 15px;margin:12px 0;font-size:.95rem;}
.fb.good{background:#1c3325;border:1px solid var(--green);}
.fb.bad{background:#3a2026;border:1px solid var(--red);}

textarea{width:100%;min-height:130px;background:var(--card);color:var(--txt);
  border:1px solid var(--line);border-radius:12px;padding:12px;font-size:.97rem;
  font-family:inherit;resize:vertical;}
input[type=text],input[type=password],input[type=number],select{width:100%;background:var(--card);color:var(--txt);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.95rem;font-family:inherit;}
label.fld{display:block;margin:12px 0 4px;font-size:.85rem;color:var(--dim);font-weight:600;}

.timerbox{text-align:center;padding:18px;}
.timerbox .t{font-size:3rem;font-weight:800;font-variant-numeric:tabular-nums;}

/* SR card */
.srcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:26px 18px;min-height:160px;display:flex;flex-direction:column;
  justify-content:center;text-align:center;font-size:1.05rem;}
.srgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
.srgrid button{border:none;border-radius:11px;padding:11px 4px;font-weight:800;
  font-size:.82rem;cursor:pointer;color:#10131c;}

.pill{display:inline-block;background:var(--card2);border-radius:9px;padding:2px 9px;
  font-size:.74rem;font-weight:700;color:var(--dim);margin-right:6px;}
.pill.due{background:#4a2a2e;color:var(--red);}
.pill.ok{background:#1c3325;color:var(--green);}

.bug{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);}
.bug:last-child{border-bottom:none;}
.bug .chk{font-size:1.2rem;background:none;border:none;cursor:pointer;padding:2px;}
.bug .txt{flex:1;font-size:.95rem;}
.bug.sq .txt{text-decoration:line-through;color:var(--faint);}

.banner{border-radius:14px;padding:12px 15px;margin:10px 0;font-size:.92rem;
  display:flex;gap:10px;align-items:center;}
.banner.alert{background:#3a2630;border:1px solid var(--red);}
.banner.info{background:#1d2a3f;border:1px solid var(--blue);}
.banner.win{background:#1c3325;border:1px solid var(--green);}

#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--card2);border:1px solid var(--line);color:var(--txt);
  padding:11px 18px;border-radius:14px;font-weight:700;display:none;max-width:90vw;text-align:center;}

.spin{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:rot .8s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg)}}

.feedback-md{background:var(--card);border:1px solid var(--purple);border-radius:14px;
  padding:14px 16px;margin:12px 0;font-size:.93rem;white-space:pre-wrap;}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.statgrid .card{margin:0;text-align:center;}
.statgrid .big{font-size:1.7rem;font-weight:800;}
hr{border:none;border-top:1px solid var(--line);margin:16px 0;}
details{margin:10px 0;} summary{cursor:pointer;color:var(--dim);font-weight:600;}
.conf{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.conf button{background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:9px;padding:7px 10px;font-size:.82rem;cursor:pointer;}
.conf button.sel{background:var(--blue);color:#08182e;border-color:var(--blue);font-weight:800;}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="app"></div>
<div id="sheet"><div class="inner" id="sheetInner"></div></div>
<nav id="nav"></nav>
<div id="toast"></div>
<script>
// ===================== PRAXIS CURRICULUM (Units 1-7) =====================
// Sources: CFAR Handbook (2021), Hammertime (alkjash), CFAR reading list,
// "Attitudes about Applied Rationality" (Camille B., LessWrong 2024).
const CURRICULUM = [

// ---------------------------------------------------------------- UNIT 1
{ id:'u1', icon:'👁️', color:'var(--blue)', title:'Noticing', sub:'The skill beneath all skills',
  source:[['CFAR Handbook: Noticing','https://www.rationality.org/resources/handbook'],['Book: Thinking, Fast and Slow (Kahneman)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'u1c1', icon:'👁️', title:'The skill beneath all skills', kind:'learn',
teach:`<p>Every technique in this app has the same first step: <b>noticing</b> that you are in a situation where the technique applies — <i>while it is happening</i>, not three hours later in the shower.</p>
<p>Noticing is a trainable perceptual skill. Like a birder learning to spot a silhouette, you can learn to spot mental events: a flash of irritation, the urge to check your phone, the half-second flinch away from a scary thought.</p>
<div class="key"><b>Why this comes first:</b> applied rationality fails mostly at Step 0. People know fifteen debiasing techniques and apply none, because the moment that called for them was never noticed. (Kahneman makes the same point: System 1 runs the show by default; System 2 only engages when summoned.)</div>
<h4>What a noticing rep looks like</h4>
<p>1. Pick ONE target sensation (e.g. the feeling of being interrupted).<br>2. When it happens, mentally mark it: <i>"noticing — interruption."</i><br>3. Do nothing else. No fixing, no judging. Just the mark.</p>
<div class="ex"><b>Example:</b> Lena trains on the feeling of <i>defensiveness</i>. Day 1 she catches it once, an hour late. Day 4 she catches it mid-sentence. Day 9 she catches the precursor — a tightening in her chest — before she even speaks. Now, and only now, can she choose what to do next.</div>
<p>Everything later — TAPs, aversion factoring, Murphyjitsu — is built on this. Five noticing reps on a real day beat fifty hypothetical exercises.</p>`,
quiz:[
{q:'Why does this curriculum put noticing before every other technique?',opts:[
['Because noticing is the most impressive skill to show others',0,'No — noticing is nearly invisible from outside. Its value is that no other technique can trigger without it.'],
['Because most techniques fail at Step 0: the relevant moment passes unnoticed',1,'Exactly. Knowing a technique and deploying it in the live moment are different skills; noticing bridges them.'],
['Because noticing replaces the need for other techniques',0,'Noticing alone changes little — it is the doorway, not the room. You still need the technique behind the door.']]},
{q:'You feel a flash of annoyance during a meeting and mentally mark "noticing — annoyance", then return to the meeting. Did you do the rep correctly?',opts:[
['No — you should have immediately analyzed why you were annoyed',0,'Analysis is a different (later) move. Pure noticing practice deliberately stops at the mark, which keeps the rep cheap enough to do dozens of times a day.'],
['Yes — mark it, do nothing else',1,'Correct. The rep is intentionally tiny. Cheap reps get repeated; expensive ones get abandoned.'],
['No — noticing only counts if you catch it before it happens',0,'Catching precursors comes with practice. Late noticing still strengthens the skill; the latency shrinks with reps.']]}],
cards:[
['What is the "Step 0" failure of applied rationality?','Knowing a technique but never deploying it, because the moment it applied was never noticed in real time.'],
['What are the 3 parts of a noticing rep?','1) One pre-chosen target sensation. 2) Mark it mentally when it occurs ("noticing — X"). 3) Do nothing else.'],
['Why keep noticing reps tiny (no analysis, no fixing)?','Cheap reps get repeated dozens of times a day; expensive reps get abandoned. Volume builds the perceptual skill.']],
},

{ id:'u1c2', icon:'😬', title:'Catching the flinch', kind:'field',
teach:`<p>The single most valuable noticing target is the <b>mental flinch</b>: the micro-moment where your attention bounces off something unpleasant. An unopened email. A bank balance. The thought <i>"maybe this project is failing."</i></p>
<div class="key">Flinches mark exactly the spots where your map is most likely wrong — because you have been refusing to look at the territory there. Ugh-fields grow in the dark.</div>
<p>The flinch feels like: a subject change in your own head, sudden urge to grab the phone, a vague fog, "I will deal with it later" arriving suspiciously fast.</p>
<div class="ex"><b>Example:</b> Marc notices that every time the word "taxes" crosses his mind, his hand is already reaching for Twitter. The flinch took ~400ms. The unfiled taxes took 8 months.</div>
<p>Today's mission trains only the catch. You do NOT have to fix what you find. Looking is the win.</p>`,
mission:{text:`<b>Field mission — today, on your real day:</b> catch <b>3 mental flinches</b> (attention bouncing off something uncomfortable). For each, write one line: what you flinched from, and what the flinch felt like in your body/attention. Do not fix anything. Just look.`,
placeholder:'1) Flinched from... it felt like...\n2) ...\n3) ...'},
rubric:['Three real, concrete flinch moments from an actual day (not hypotheticals)','Each names the object flinched from','Each describes the felt signature (body sensation / attention move)','No premature fixing — observation only'],
cards:[
['What is a mental flinch?','The micro-moment where attention bounces off an unpleasant thought or task (email, bank balance, doubt about a project).'],
['Why are flinches high-value noticing targets?','They mark where your map is most likely wrong — places you systematically refuse to look. Ugh-fields grow in the dark.']],
},

{ id:'u1c3', icon:'📍', title:'Mental notes & the trigger log', kind:'drill',
teach:`<p>To get noticing volume up, rationalists use a <b>trigger log</b>: a running list of moments worth catching. Common high-yield targets:</p>
<p>• <b>Surprise</b> — reality just diverged from your model. Free calibration data.<br>• <b>Confusion</b> — "either the world is weird or my model is wrong." (Your model is wrong.)<br>• <b>Defensiveness</b> — you might be protecting a belief instead of testing it.<br>• <b>The "should" feeling</b> — heavy obligation without desire; data about a motivation bug.<br>• <b>Rehearsing an argument</b> — you stopped updating minutes ago.</p>
<div class="key">Pick targets you actually encounter on a normal workday. The practice must fit inside your real life, between meetings, on the commute — or it will not happen.</div>`,
drill:{prompt:`Choose your <b>2 noticing targets for this week</b> from the list above (or your own). For each: (a) name it, (b) describe its earliest detectable signature in YOU specifically, (c) name one realistic situation tomorrow where it is likely to fire.`,
placeholder:'Target 1: surprise — signature: tiny eyebrow raise + "huh"... likely tomorrow when...',min:5},
rubric:['Two targets named, suited to an ordinary day','Signatures are specific and personal (body/attention level), not generic definitions','Each has a plausible concrete situation within 24h','Targets are observable, not vague traits like "being irrational"'],
cards:[
['Why is surprise a high-yield noticing target?','Surprise = reality diverging from your model. Each surprise is free evidence for recalibrating beliefs.'],
['What does noticing "I am rehearsing my argument" tell you?','You have stopped listening/updating — the conversation became a performance. Time to find the actual disagreement.'],
['What makes a good personal noticing target?','It occurs on a normal day, has an early detectable felt signature, and marks a moment where a better move exists.']],
},
]},

// ---------------------------------------------------------------- UNIT 2
{ id:'u2', icon:'🐛', color:'var(--red)', title:'Bug Hunt', sub:'Real problems are the gym',
  source:[['Hammertime Day 1: Bug Hunt','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/rFjhz5Ks685xHbMXW'],['Book: Getting Things Done framing — capture everything','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'u2c1', icon:'🔍', title:'What counts as a bug', kind:'learn',
teach:`<p>Applied rationality cannot be practiced on made-up examples — you need <b>real material</b>. That material is your <b>bugs</b>: anything in your life that is not the way you would like it to be.</p>
<p>A bug can be tiny ("my desk chair squeaks", "I always forget my badge") or huge ("I am in the wrong career"). Hammertime's rule: <b>if it bugs you, it is a bug.</b> No bug is too small to file, and filing is not committing to fix.</p>
<div class="key">Your bug list is the fuel tank of this entire app. Every later technique — Yoda Timers, TAPs, Goal Factoring, CoZE — will reach into this list for a real target. An empty list means fake practice.</div>
<h4>Three classic capture mistakes</h4>
<p>1. <b>Filtering for fixability</b> — file it even if it seems unsolvable; future-you will have more hammers.<br>2. <b>Filtering for importance</b> — small bugs train the fix-it muscle cheaply.<br>3. <b>Writing solutions instead of observations</b> — "buy standing desk" is a solution; "back hurts by 3pm" is the bug. File the bug.</div>`,
quiz:[
{q:'"I should really use my mornings better" — is this well-filed as a bug?',opts:[
['Yes, perfectly filed',0,'It is vague and pre-judged ("should"). Better: the observation behind it — e.g. "I spend 8:00-9:30 scrolling and feel gross afterwards." Concrete observations are workable; shoulds are fog.'],
['Almost — restate it as a concrete observation, e.g. "I scroll 8:00-9:30 and feel gross after"',1,'Right. A bug is an observation about how things are. Concrete beats judgmental, and observation beats solution.'],
['No — only major life problems belong on a bug list',0,'Opposite of the Hammertime rule: if it bugs you, it is a bug. Small bugs are cheap training material.']]},
{q:'Why file bugs you have no idea how to solve?',opts:[
['Because writing them down solves them automatically',0,'Filing is not fixing. The point is that future-you, armed with techniques from later units, will have more hammers than present-you.'],
['Because future-you will have more hammers; capture and fixing are separate steps',1,'Exactly. Capture everything, judge later — the same separation GTD insists on.'],
['You should not — unsolvable bugs clutter the list',0,'Filtering at capture time is the classic mistake. Many "unsolvable" bugs fall to a 5-minute Resolve Cycle in Unit 3.']]}],
cards:[
['Define "bug" (Hammertime).','Anything in your life that is not the way you would like it to be. If it bugs you, it is a bug.'],
['Bug vs solution — which do you file?','The observation ("back hurts by 3pm"), not the solution ("buy standing desk"). Solutions filed as bugs hide the real problem.'],
['Three capture mistakes when filing bugs','Filtering for fixability, filtering for importance, writing solutions instead of observations.']],
},

{ id:'u2c2', icon:'⚙️', title:'Generators', kind:'drill',
teach:`<p>When the list runs dry, you need <b>generators</b> — prompts that surface real problems on demand. Rotate them:</p>
<p>• <b>Room sweep:</b> walk through your home/desk; everything annoying gets filed.<br>• <b>Day replay:</b> replay yesterday hour by hour; file every friction point.<br>• <b>Areas-of-life sweep:</b> health, money, work, relationships, fun — rate each /10; anything under 8 contains bugs. Name them.<br>• <b>"What should you do?"</b> — ask: if I were giving advice to someone in exactly my situation, what would I tell them to deal with? The gap between that and what you are doing is a bug.<br>• <b>Flinch ledger:</b> your Unit 1 flinches — each one points at a bug.<br>• <b>Staring into the abyss (gentle version):</b> "What am I pretending not to know?" File whatever surfaces, even half-formed. (The full-strength version gets its own chapter later.)</p>
<div class="key">Generators turn "I have no problems to practice on" — which is never true — into a list of twenty within ten minutes.</div>`,
drill:{prompt:`Run ONE generator right now, for 5 minutes by timer, and file <b>at least 5 bugs</b> below (one per line — they will be added to your Bug Ledger). Note which generator you used.`,
placeholder:'Generator: day replay\n- bug 1...\n- bug 2...',min:5,timer:5,bugcapture:true},
rubric:['At least 5 bugs filed','Bugs are concrete observations, not vague shoulds or pre-baked solutions','Mix of sizes (at least one tiny, at least one that matters)','Generator named'],
cards:[
['Name 4 bug generators.','Room sweep, day replay, areas-of-life ratings (/10), "what would I advise someone in my exact situation?", flinch ledger, "what am I pretending not to know?"'],
['What does the "What should you do?" generator detect?','The gap between the advice you would give someone in your situation and what you actually do. That gap is a bug.']],
},

{ id:'u2c3', icon:'🪲', title:'The standing Bug Hunt', kind:'checkin',
teach:`<p>This is your first <b>standing practice</b>. From now on, Praxis expects you to file <b>at least one new bug every day</b>. If you have not filed one within your chosen window, the app will nag you — that is the deal you are making now.</p>
<div class="key">Why a check-in instead of a lesson? Because bug-noticing is a <i>perceptual habit</i>, not knowledge. It only becomes automatic through daily contact with your real life. This is the Object-Level attitude: microdosed practice woven into actual days.</div>
<p>Filing takes 20 seconds. On busy days, one tiny bug ("the meeting had no agenda — again") keeps the habit alive. Streak-friendly, workday-friendly.</p>
<p>You can adjust the window or pause the habit anytime in the Habits tab — flexibility is a feature, abandonment is not.</p>`,
checkin:{key:'bughunt',label:'Bug Hunt',icon:'🐛',every:24,
ask:'File at least one new bug from the last day (concrete observation, any size).',
form:'bugs'},
cards:[
['Why is Bug Hunt a recurring check-in rather than a one-time lesson?','Bug-noticing is a perceptual habit, not knowledge — it becomes automatic only through daily contact with real life.']],
},
]},

// ---------------------------------------------------------------- UNIT 3
{ id:'u3', icon:'⏳', color:'var(--green)', title:'Yoda Timers', sub:'Five minutes of actually trying',
  source:[['Hammertime Day 2: Yoda Timers','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/vpvKEj7shuk8h5Eet'],['CFAR Handbook: Resolve Cycles','https://www.rationality.org/resources/handbook']],
  chapters:[

{ id:'u3c1', icon:'🧪', title:'Five minutes of full effort', kind:'learn',
teach:`<p><i>"Do. Or do not. There is no try."</i> The Yoda Timer (CFAR: <b>Resolve Cycle</b>) is brutally simple: set a 5-minute timer and <b>actually try to solve the whole problem</b> before it rings.</p>
<p>Not "work on it for 5 minutes." Try to <i>finish</i> it. The absurd deadline is the point: it forces your brain to drop the respectable-looking slow path and look for doors you assumed were locked.</p>
<div class="key">Most bugs survive not because they are hard but because nobody has ever spent five minutes of <i>full-strength, undivided</i> effort on them. Full effort for 5 minutes ≠ background worry for 5 years.</div>
<h4>What full effort feels like</h4>
<p>• You write, move, or speak — not just stare.<br>• You consider rude solutions: pay money, ask for help, delete the obligation entirely.<br>• You feel slightly silly with urgency. Good.</p>
<div class="ex"><b>Example:</b> Bug: "I have needed a dentist appointment for 6 months." Yoda Timer: phone in hand, found a dentist, booked online. 3 minutes 40 seconds. Six months of low-grade guilt, deleted.</div>
<p>If the bug is genuinely too big for 5 minutes, the timer's job changes: produce the <b>next physical action</b> and do its first step.</p>`,
quiz:[
{q:'What is the actual instruction of a Yoda Timer / Resolve Cycle?',opts:[
['Work on the problem for 5 focused minutes',0,'Close, but weaker. The instruction is to try to SOLVE the whole thing in 5 minutes. The impossible framing is what unlocks unconventional moves.'],
['Try to completely solve the problem before the 5-minute timer rings',1,'Yes. The absurd deadline forces your search out of the slow respectable path and into "wait, could I just...?" territory.'],
['Think about the problem for 5 minutes, then plan when to solve it',0,'Planning-to-plan is the failure mode this technique exists to kill. Resolve now.']]},
{q:'A bug is clearly too big to solve in 5 minutes (e.g. "change careers"). What does the timer become?',opts:[
['Skip it — Yoda Timers only work on small bugs',0,'Big bugs are exactly where 5 minutes of real contact beats years of avoidance. You just change the target.'],
['Produce the next physical action and take its first step before the bell',1,'Right. "Email Sarah who made this switch" is achievable in 5 minutes and converts an abyss into a path.'],
['Extend the timer to 50 minutes',0,'Longer timers lose the urgency that makes the technique work. Keep 5 minutes; shrink the target instead.']]}],
cards:[
['Yoda Timer / Resolve Cycle — core instruction','Set 5 minutes and try to SOLVE the entire problem before it rings (not merely "work on it").'],
['Why does the absurd 5-minute deadline help?','It forces the brain off the slow respectable path toward unconventional moves: pay, ask, delete, do it right now.'],
['Yoda Timer on a too-big problem: what is the target?','Produce the next physical action and execute its first step before the bell.']],
},

{ id:'u3c2', icon:'🔨', title:'Resolve Cycle on a real bug', kind:'drill',
teach:`<p>Time to use real fuel. Open your Bug Ledger (mentally or in the Ledger tab), pick a bug that has annoyed you for over a week, and run a true Resolve Cycle with the timer below.</p>
<div class="key">Pick a bug you semi-believe is unsolvable in 5 minutes. The training effect comes from the surprise of how often that belief is wrong.</div>`,
drill:{prompt:`Run a 5-minute Resolve Cycle on a real bug from your ledger. Then report: which bug, what you actually DID during the 5 minutes (actions, not thoughts), and the state of the bug now (solved / next action produced / genuinely stuck — where exactly?).`,
placeholder:'Bug: ...\nDuring the timer I: ...\nState now: ...',min:6,timer:5,pickbug:true},
rubric:['A real ledger bug was used','Report describes concrete actions taken during the timer (typed, called, moved, wrote), not just thinking','Honest end-state: solved, next-action produced, or precisely-located stuck point','If stuck: the stuck point is specific enough to attack later'],
cards:[
['What counts as "full effort" during a Resolve Cycle?','Visible action: writing, calling, booking, moving. Considering rude options (pay, ask, delete). Not silent staring.']],
},

{ id:'u3c3', icon:'⚡', title:'Speed as a habit', kind:'checkin',
teach:`<p>Hammertime's "Yoda Timers 3: Speed" thesis: most people systematically overestimate how long things take and underestimate what raw speed unlocks. The cure is regular contact: <b>one Resolve Cycle every two days</b> on a fresh bug.</p>
<div class="key">This is your second standing practice. It compounds with Bug Hunt: the hunt feeds the ledger, the cycles drain it. A healthy rationalist metabolism eats one bug every couple of days.</div>
<p>On a packed workday, a Resolve Cycle is exactly 5 minutes — it fits between two meetings. That is by design.</p>`,
checkin:{key:'resolve',label:'Resolve Cycle',icon:'⏳',every:48,
ask:'Run one 5-minute Resolve Cycle on a bug from your ledger. Report the bug + what you did + end state.',
form:'report',timer:5},
cards:[
['What is a healthy "bug metabolism"?','Bug Hunt files at least one bug daily; Resolve Cycles squash one every ~2 days. Intake and digestion in balance.']],
},
]},

{ id:'u4', icon:'🔗', color:'var(--orange)', title:'Trigger-Action Plans', sub:'Programming your autopilot',
  source:[['CFAR Handbook: TAPs','https://www.rationality.org/resources/handbook'],['Hammertime Day 3: TAPs','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/ESnzpoCJrAfwAzpMB']],
  chapters:[

{ id:'u4c1', icon:'🧩', title:'Anatomy of a TAP', kind:'learn',
teach:`<p>A <b>Trigger-Action Plan</b> is the smallest unit of behavior change: <i>"When [precise sensory trigger], I will [tiny action]."</i> Psychology literature calls them implementation intentions; the effect sizes are unusually solid.</p>
<p>TAPs work because they pre-compile a decision. The choosing happens once, calmly, in advance; the doing happens automatically, in the moment, when willpower is unavailable.</p>
<h4>The two laws</h4>
<p>1. <b>The trigger must be concrete and sensory.</b> "When I get home" is fog. "When I hear my key hit the bowl by the door" is a trigger. If you cannot name the exact sight/sound/sensation, your autopilot cannot either.<br>
2. <b>The action must be ≤ ~10 seconds, or be the first physical step of something longer.</b> "Exercise" fails. "Put on my running shoes" fires.</p>
<div class="ex"><b>Example:</b> Bug: phone-checking during conversations. TAP: "When my hand touches my pocket while someone is talking → I place the hand flat on the table." Trigger = exact proprioceptive sensation; action = 2 seconds.</div>
<div class="key">A TAP is a bet that the moment will be noticed. That is why Unit 1 came first: TAPs are noticing skill, weaponized.</div>`,
quiz:[
{q:'Which is the best-formed TAP?',opts:[
['"When I feel like procrastinating, I will be more disciplined"',0,'Both halves fail: the trigger is a vague internal state with no sensory signature, and the action is a trait, not a movement.'],
['"When my laptop shows the lock screen at 9:00, I will open my task list and read the top item"',1,'Concrete visual trigger, sub-10-second physical action. This can compile to autopilot.'],
['"Every morning I will do deep work"',0,'No trigger at all — "every morning" is a schedule wish, not a sensory cue. And "deep work" is not a 10-second action.']]},
{q:'Why must TAP actions be tiny (≤10 seconds or a first physical step)?',opts:[
['Because small actions are the only ones that matter',0,'Big actions matter — but autopilot cannot execute them directly. It can execute the first step that puts you on the rails.'],
['Because the habit loop can only reliably automate short motor sequences; momentum handles the rest',1,'Exactly. "Put on running shoes" is automatable; running follows with surprising reliability once shoes are on.'],
['To avoid getting tired',0,'Fatigue is not the mechanism. Reliability of automatic execution is.']]},
{q:'A TAP keeps failing to fire. Per the two laws, what is the FIRST thing to check?',opts:[
['Whether you want it badly enough',0,'Motivation is rarely the bottleneck for TAPs — design is. Check the trigger before questioning your character.'],
['Whether the trigger has a precise sensory signature you actually encounter',1,'Right. Most dead TAPs have foggy triggers. Re-anchor on an exact sight/sound/sensation that reliably occurs.'],
['Whether you should add a reward',0,'Rewards can help installation, but a trigger that never gets noticed makes everything downstream moot.']]}],
cards:[
['TAP formula + the two laws','"When [trigger], I will [action]". Law 1: trigger concrete & sensory. Law 2: action ≤10s or the first physical step.'],
['Why do TAPs work (mechanism)?','They pre-compile a decision: choose once in advance, execute automatically in the moment when willpower is absent. (Implementation intentions.)'],
['First debugging step for a TAP that never fires','Check the trigger: does it have an exact sensory signature that actually occurs? Foggy triggers are the #1 cause of dead TAPs.']],
},

{ id:'u4c2', icon:'🛠️', title:'Install one real TAP', kind:'drill',
teach:`<p>Pick a bug from your ledger that involves a <i>recurring moment</i> (a habit, a friction point, a thing you always forget). Design one TAP for it and rehearse it.</p>
<h4>Installation protocol (CFAR)</h4>
<p>1. Write the TAP.<br>2. <b>Visual rehearsal ×10:</b> vividly imagine the trigger — the actual scene, sounds, sensations — then imagine performing the action. Ten times. This is what wires it.<br>3. If possible, physically walk through it once.</p>
<div class="key">One TAP, installed properly, beats five TAPs written down. Praxis will quiz you on YOUR tap in review — your TAPs become spaced-repetition cards.</div>`,
drill:{prompt:`Design and rehearse ONE TAP for a real recurring bug. Report: (a) the bug, (b) the TAP in "When X, I will Y" form, (c) confirmation you did 10 visual rehearsals and what you noticed during them.`,
placeholder:'Bug: ...\nTAP: When ... , I will ...\nRehearsal: did 10 reps; noticed ...',min:6,tapcapture:true},
rubric:['Trigger is sensory-concrete (exact sight/sound/sensation) and occurs reliably','Action ≤10 seconds or a true first physical step','TAP attacks a real ledger bug','10 visual rehearsals actually performed, with at least one observation from them'],
cards:[],
},

{ id:'u4c3', icon:'📋', title:'TAP audit', kind:'checkin',
teach:`<p>TAPs decay silently. The fix is a recurring <b>audit</b>: every 3 days, Praxis asks you which of your installed TAPs fired since last time.</p>
<p>For each TAP: <b>fired / fired sometimes / dead</b>. Dead TAPs get one redesign (usually: sharpen the trigger) or an honest funeral. Keeping zombie TAPs on the books trains you to ignore your own plans — worse than having none.</p>
<div class="key">This is the Feedback-loop attitude in miniature: a plan with no measurement is a wish. The audit is the measurement.</div>`,
checkin:{key:'tapaudit',label:'TAP Audit',icon:'🔗',every:72,
ask:'For each of your installed TAPs: did it fire since last audit? (fired / sometimes / dead). For dead ones: redesign the trigger or retire it explicitly.',
form:'report'},
cards:[
['Why audit TAPs every few days?','TAPs decay silently. Unmeasured plans are wishes (Feedback-loop attitude); zombie TAPs train you to ignore your own plans.'],
['What do you do with a dead TAP at audit time?','One redesign (usually sharpen the trigger to something more sensory/reliable) — or an explicit funeral. Never keep zombies.']],
},
]},

{ id:'u5', icon:'📐', color:'var(--teal)', title:'Design', sub:'Make the right thing the easy thing',
  source:[['Hammertime Day 4: Design','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/HHjn3r8n7bJp6Q5HE'],['CFAR Handbook: Systemization','https://www.rationality.org/resources/handbook']],
  chapters:[

{ id:'u5c1', icon:'🏗️', title:'Choice architecture for one', kind:'learn',
teach:`<p>Willpower is a budget; <b>design</b> is changing the prices. Instead of resolving to resist the cookie, you stop buying cookies. Instead of resolving to focus, the phone sleeps in another room.</p>
<p>Hammertime's Design principle: <b>notice friction, then move it.</b> Add friction to what you want less of; remove friction from what you want more of. Twenty seconds of added inconvenience kills most impulses; twenty seconds removed births most habits.</p>
<div class="ex"><b>Examples:</b> Gym bag packed by the door the night before (−friction). Social apps logged out with a long random password kept on paper downstairs (+friction). Vitamin bottle on top of the coffee machine (−friction, plus the coffee is now the TAP trigger).</div>
<div class="key">Design beats discipline because it works while you sleep, scales to bad days, and never gets tired. A designed environment is a TAP carved into matter.</div>
<p>The diagnostic question, always: <i>"Where did my environment make the wrong thing easy yesterday?"</i></p>`,
quiz:[
{q:'You keep snacking while working. The Design move is:',opts:[
['Resolve firmly each morning not to snack',0,'That spends willpower budget daily and loses on tired days. Design changes the price instead of paying it repeatedly.'],
['Move snacks to a high shelf in another room; put a water bottle on the desk',1,'+20 seconds of friction on the impulse, −friction on the substitute. The environment now votes for you around the clock.'],
['Track every snack in a spreadsheet',0,'Measurement is useful but is not the design move — it does not change the price of the action in the moment.']]},
{q:'Why does ~20 seconds of friction change behavior so much?',opts:[
['Impulses are short-lived; if execution takes longer than the impulse, it usually dies',1,'Yes — most impulses are brief spikes. A 20-second tax outlives the spike. Symmetrically, removing 20s of setup lets fragile intentions survive into action.'],
['Because 20 seconds is enough to feel guilty',0,'Guilt is not the mechanism — impulse decay is. Design works even when you feel no guilt at all.'],
['It does not — only total prevention works',0,'Empirically false: small frictions move behavior a lot (this is the entire field of choice architecture).']]}],
cards:[
['Core Design principle','Add friction to what you want less of; remove friction from what you want more of. ~20 seconds changes most behavior.'],
['Why does design beat discipline?','It works while you sleep, survives bad days, never tires. Willpower is a budget; design changes prices instead of spending it.'],
['Daily design diagnostic question','"Where did my environment make the wrong thing easy yesterday?"']],
},

{ id:'u5c2', icon:'🔧', title:'One design fix', kind:'field',
teach:`<p>Mission: change your physical or digital environment <b>today</b> so that one recurring bug becomes structurally harder to occur — or one desired behavior becomes structurally easier.</p>
<div class="key">It must be a change in the world, not in your intentions. If a stranger inspected your space, they could see the difference.</div>`,
mission:{text:`<b>Field mission:</b> implement ONE design fix on a real ledger bug today. Report: the bug, the physical/digital change you made (visible to a stranger), and the friction direction (+ on bad / − on good).`,
placeholder:'Bug: ...\nChange made: ...\nFriction: added/removed on ...'},
rubric:['The change is physical/digital and already executed (not planned)','Clearly tied to a recurring ledger bug','Friction direction is explicit and correctly reasoned','A stranger could verify the change by looking'],
cards:[],
},

{ id:'u5c3', icon:'🗂️', title:'Systemization & the weekly design review', kind:'checkin',
teach:`<p>CFAR's <b>Systemization</b> extends design to processes: any task you have done more than three times deserves a system — a checklist, a template, a default time, an automation, a standing order.</p>
<p>The compounding move is the <b>weekly design review</b> (~10 minutes): scan the week for repeated friction, pick ONE recurring annoyance, and either design it away or systemize it.</p>
<div class="key">One design fix per week = fifty-two structural improvements a year, each working forever. This is the highest-leverage recurring practice in the app.</div>`,
checkin:{key:'design',label:'Design Review',icon:'📐',every:168,
ask:'Weekly review: scan the week for repeated friction. Pick ONE recurring annoyance and design/systemize it away. Report the friction and the fix you implemented.',
form:'report'},
cards:[
['When does a task deserve a system?','Done more than ~3 times → checklist, template, default time, automation, or standing order.'],
['What is the weekly design review?','~10 min: scan the week for repeated friction, pick ONE recurring annoyance, design or systemize it away. 52 permanent fixes/year.']],
},
]},

{ id:'u6', icon:'🎯', color:'var(--purple)', title:'Goal Factoring', sub:'Why do you even do that?',
  source:[['CFAR Handbook: Goal Factoring & Units of Exchange','https://www.rationality.org/resources/handbook'],['Hammertime: Goal Factoring','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/Cu5C5KhkoXhrPMLFN']],
  chapters:[

{ id:'u6c1', icon:'🌳', title:'Actions are bundles', kind:'learn',
teach:`<p>Almost nothing you do serves a single purpose. You attend the weekly meeting for: information (a little), being seen as reliable (a lot), coffee with Ana afterwards (honestly, mostly). <b>Goal Factoring</b> makes the bundle explicit:</p>
<p>1. Pick a recurring action (or one you are avoiding).<br>2. List ALL the goals it serves — including the unflattering ones. (The list is not complete until something on it is slightly embarrassing.)<br>3. For each goal, ask: <b>is there a cheaper or better way to get this?</b><br>4. Recombine: keep, restructure, or replace the action.</p>
<div class="ex"><b>Example:</b> Tomas "reads the news" 90 min/day. Factored goals: feel informed (10 min digest would do), conversation material (Slack thread does it better), and — the embarrassing one — a socially acceptable break from work. Replacing the third with actual walks cut news to 15 min and improved both rest and focus.</div>
<div class="key">The classic finding: the action survives, but restructured — or one hidden goal turns out to be load-bearing and finally gets served properly instead of sideways.</div>`,
quiz:[
{q:'How do you know your goal list for an action is complete?',opts:[
['When it contains at least 5 goals',0,'No magic number. The CFAR heuristic is different: completeness is signaled by honesty, not count.'],
['When at least one listed goal is slightly embarrassing to admit',1,'Yes — the load-bearing goals are often the unflattering ones (status, avoidance, comfort). A list with only respectable goals is usually missing the engine.'],
['When every goal is measurable',0,'Measurability is nice but unrelated to completeness. "Feeling needed" is unmeasurable and frequently the true engine.']]},
{q:'Goal Factoring most often concludes with:',opts:[
['Quitting the analyzed activity',0,'Quitting happens but is not the modal outcome. Usually some goals are real and worth serving.'],
['Keeping the activity but restructuring it, or serving a hidden goal directly instead of sideways',1,'Right. The win is usually surgical: same goals, cheaper bundle — or a hidden goal finally served on purpose.'],
['Feeling guilty about your true motives',0,'Anti-goal. The unflattering motives are treated as legitimate customer requirements, not sins.']]}],
cards:[
['Goal Factoring — 4 steps','1) Pick recurring/avoided action. 2) List ALL goals it serves (incl. embarrassing). 3) Per goal: cheaper/better way? 4) Recombine: keep, restructure, replace.'],
['Completeness test for a goal list','At least one entry is slightly embarrassing. Respectable-only lists are missing the engine.'],
['Modal outcome of goal factoring','Not quitting: restructuring the action, or serving a hidden goal directly instead of sideways.']],
},

{ id:'u6c2', icon:'⚖️', title:'Units of Exchange', kind:'learn',
teach:`<p>Goal Factoring needs a currency. CFAR's <b>Units of Exchange</b>: train yourself to convert between time, money, energy, and attention — because you trade them constantly whether or not you look.</p>
<p>Compute your rough <b>hourly value</b> (not salary — what an hour of discretionary time is worth to you). Then practice conversions:</p>
<div class="ex">• 40 min/week commute fight over a cheaper parking spot, to save 6€ — is that a trade you would take if stated aloud?<br>• A 90€ robot vacuum vs. 26 hours/year of sweeping.<br>• "Free" social media: 70 min/day = 425 hours/year. At your hourly value, what did it cost?</div>
<div class="key">The skill is not frugality in any single currency — it is <i>refusing trades you would never accept if stated explicitly</i>. Most people burn hours to save cents and burn attention to save minutes.</div>`,
quiz:[
{q:'The core skill of Units of Exchange is:',opts:[
['Saving as much money as possible',0,'Money is one currency among four. Optimizing it alone produces classic errors like burning hours to save cents.'],
['Making implicit trades explicit, and refusing the ones you would never accept aloud',1,'Exactly. The conversions (time↔money↔energy↔attention) exist to surface trades you are already making blindly.'],
['Valuing your time at your salary rate',0,'Salary is a weak proxy — discretionary-hour value differs from billed value, and varies with energy and context.']]}],
cards:[
['The four currencies of Units of Exchange','Time, money, energy, attention — you trade between them constantly whether or not you look.'],
['Units of Exchange — the core skill','Make implicit trades explicit; refuse any trade you would never accept if stated aloud (e.g. 40 min of fighting traffic to save 6€).']],
},

{ id:'u6c3', icon:'🧮', title:'Factor a real activity', kind:'drill',
teach:`<p>Apply both tools to your real schedule. Choose a recurring activity that consumes ≥2 hours/week — or a commitment you keep but resent.</p>`,
drill:{prompt:`Goal-factor a real recurring activity (≥2h/week). Report: (a) the activity + weekly cost in time/money/energy, (b) the FULL goal list — flag the embarrassing one, (c) for each goal a cheaper/better channel if one exists, (d) your recombination decision (keep / restructure how / replace with what).`,
placeholder:'Activity: ... (~Xh/week)\nGoals: 1)... 2)... 3) [embarrassing] ...\nCheaper channels: ...\nDecision: ...',min:10},
rubric:['Real activity with honest cost accounting across currencies','Goal list passes the embarrassment test','Each goal examined for a cheaper/better channel, not just the convenient ones','A concrete recombination decision with a first step, not "I should think about this"'],
cards:[],
},
]},

// ---------------------------------------------------------------- UNIT 7
{ id:'u7', icon:'🌊', color:'var(--red)', title:'Aversions & Comfort', sub:'Emotions are data, avoidance is expensive',
  source:[['CFAR Handbook: Aversion Factoring & CoZE','https://www.rationality.org/resources/handbook'],['Hammertime Day 5 & 7-8','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/c5wFM7KJLtuMnLFsH']],
  chapters:[

{ id:'u7c1', icon:'🧲', title:'Aversion Factoring', kind:'learn',
teach:`<p>When you "just never get around to" something for months, the cause is usually an <b>aversion</b> — a quiet flinch with a reason inside it. Aversion Factoring treats the flinch as data:</p>
<p>1. Name the avoided thing.<br>2. List every aversion: imagine starting it <i>right now</i> and write down each "ugh" as it arrives.<br>3. Sort each aversion: is it tracking something <b>real</b> (the task genuinely has this cost) or is it <b>miscalibrated</b> (inherited, outdated, exaggerated)?<br>4. <b>Real → redesign the task</b> to remove the cost. <b>Miscalibrated → test it gently</b> (that is CoZE, next chapter).</p>
<div class="ex"><b>Example:</b> Avoided: calling the landlord. Aversions: (a) phone calls can start at bad moments — real → schedule it, send a text first; (b) "he will be angry" — testable: last 3 interactions were fine → miscalibrated, shrink it with one small test call.</div>
<div class="key">Never bulldoze an aversion with willpower before sorting it. Some flinches are your best risk-detection firing correctly. The sin is not having aversions; it is never looking inside them.</div>`,
quiz:[
{q:'You feel a strong "ugh" about a task. The aversion-factoring move is:',opts:[
['Push through — aversions are just weakness',0,'Bulldozing unsorted aversions discards real information and trains self-distrust. Some flinches are correct risk-detection.'],
['List the component aversions, then sort each: tracking something real vs. miscalibrated',1,'Yes. Real costs get designed away; miscalibrated fears get gently tested. Different defects, different repairs.'],
['Conclude the task is not for you',0,'That treats the bundled flinch as a verdict. Unbundled, half of it is usually fixable and half dissolvable.']]},
{q:'An aversion turns out to be REAL (the task genuinely has that cost). What do you do?',opts:[
['Redesign the task to remove or compensate the cost',1,'Right — e.g. hate the gym crowd? Go at 7am or train at home. Respect the data, change the design.'],
['Use willpower, since now you understand it',0,'Understanding a real cost does not make paying it free. Redesign beats repeated payment.'],
['Expose yourself to it repeatedly until it stops bothering you',0,'Exposure is for MIScalibrated aversions. Numbing yourself to real costs is self-harm with extra steps.']]}],
cards:[
['Aversion Factoring — 4 steps','1) Name avoided thing. 2) List each "ugh" (imagine starting now). 3) Sort: real vs miscalibrated. 4) Real → redesign task; miscalibrated → gentle test (CoZE).'],
['Real vs miscalibrated aversion — different repairs','Real cost → change the task design. Miscalibrated fear → small safe experiment. Never bulldoze before sorting.']],
},

{ id:'u7c2', icon:'🚪', title:'CoZE: experiments, not exposure', kind:'field',
teach:`<p><b>Comfort Zone Expansion</b> is the empiricist branch: for a <i>miscalibrated</i> aversion, design a small real-world experiment that tests the fear's prediction.</p>
<p>The frame matters: CoZE is <b>not</b> "do scary things to toughen up." It is <i>"my fear predicts X will happen; let us check."</i> You are a scientist, the fear is a hypothesis, the world is the lab.</p>
<div class="ex"><b>Examples:</b> Fear: "If I ask a basic question in the meeting, people will think less of me." Experiment: ask one basic question; observe actual reactions. Fear: "Negotiating the quote will offend the contractor." Experiment: ask politely for one discount this week; record response.</div>
<div class="key">Rules: the experiment must be safe, reversible, real (not simulated), and small enough to actually run this week. Record the prediction BEFORE and the outcome AFTER — otherwise hindsight eats the update.</div>`,
mission:{text:`<b>Field mission:</b> design and RUN one CoZE experiment this week on a miscalibrated aversion. Report: the fear's explicit prediction (written before), the experiment, what actually happened, and the size of your update.`,
placeholder:'Fear predicted: ...\nExperiment: ...\nWhat happened: ...\nUpdate: ...'},
rubric:['Targets a plausibly miscalibrated aversion (not a real cost)','Prediction recorded before the test, specific enough to be falsified','Experiment was real, safe, reversible, and actually executed','Honest comparison of prediction vs outcome, with an explicit update'],
cards:[
['CoZE — correct frame','Not "toughen up": treat the fear as a hypothesis making a prediction, design a small real experiment, compare prediction to outcome.'],
['CoZE experiment rules','Safe, reversible, real (not simulated), small enough to run this week, prediction written down BEFORE.']],
},

{ id:'u7c3', icon:'🪙', title:'Sunk Cost Faith', kind:'learn',
teach:`<p>Hammertime Day 8 offers a contrarian pairing. The <b>sunk cost fallacy</b> — continuing because of what you already spent — is a real bias. But beginners overcorrect into <b>quitting everything the moment it feels hard</b>, which has its own name: the sunk cost <i>temptation</i> is sometimes the only thing carrying you through the desert every long-term project crosses.</p>
<p>The reconciliation: evaluate <b>at the right timescale</b>. Decide whether to continue a marathon project on scheduled review days (monthly, quarterly) using forward-looking math only. Between reviews, practice <b>Sunk Cost Faith</b>: the feeling of "but I have put so much in" is reframed as evidence that past-you, on a calm day, judged this worth doing.</p>
<div class="key">Day-to-day mood is noise. Scheduled, calm, forward-looking review is signal. Quit on signal, never on noise.</div>`,
quiz:[
{q:'When should you re-evaluate whether to continue a long-term project?',opts:[
['Whenever it feels pointless',0,'Feels-pointless days cluster exactly where the desert is driest. Quitting on mood noise kills most worthwhile projects at their hardest mile.'],
['On scheduled review days, with forward-looking math; between reviews, keep faith',1,'Right. This gets you the anti-sunk-cost correction at the timescale where it is valid, without the overcorrection of mood-quitting.'],
['Never — quitting is always the fallacy',0,'Refusing to ever quit is the original sunk cost fallacy. The fix is scheduled forward-looking review, not blind persistence.']]}],
cards:[
['Sunk Cost Faith — the rule','Evaluate long projects only on scheduled review days with forward-looking math. Between reviews, persist: mood is noise, review is signal.'],
['The beginner overcorrection to sunk-cost awareness','Quitting anything the moment it feels hard. The desert in the middle of long projects then kills everything worthwhile.']],
},
]},
];

{ id:'u8', icon:'🔮', color:'var(--blue)', title:'Inner Simulator', sub:'Your gut runs simulations — use them',
  source:[['CFAR Handbook: Inner Simulator & Murphyjitsu','https://www.rationality.org/resources/handbook'],['Hammertime Day 10: Murphyjitsu','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/N47M3JiHveHfwdbFg'],['Book: Superforecasting (Tetlock)','https://www.rationality.org/resources/reading-list']],
  chapters:[

{ id:'u8c1', icon:'🎞️', title:'Asking your gut properly', kind:'learn',
teach:`<p>Your System 1 contains a high-fidelity <b>simulator</b> trained on your entire life. It knows things your explicit reasoning does not — but it answers a different question than the one you usually ask.</p>
<p>Ask "will my plan work?" and your verbal mind replies with hope. Ask the simulator instead — <b>concretely picture the outcome having happened</b> — and read off the involuntary reaction:</p>
<div class="key">The <b>surprise-o-meter</b>: vividly imagine it is next Friday and the report is NOT finished. Are you surprised? If your gut says "obviously that is what happens," your plan was fiction and the simulator just told you so.</div>
<p>The simulator speaks in surprise, relief, dread, and "of course" — not in words. The skill is posing questions in its native format: specific scenes, specific dates, outcomes stated as already-happened facts.</p>
<div class="ex"><b>Example:</b> "Imagine you delegated the launch email to Sam and it went out on time. Surprised?" Gut: mild disbelief. That disbelief is data — something in you knows Sam is overloaded. Now you can ask what it knows.</div>`,
quiz:[
{q:'Why does "imagine it is Friday and the report is unfinished — are you surprised?" work better than "will I finish by Friday?"',opts:[
['It is more pessimistic, and pessimism is more accurate',0,'Not pessimism — format. The simulator can run a concrete scene; it cannot parse an abstract probability question, which the verbal mind hijacks with hope.'],
['It poses the question in the simulator’s native format — a concrete scene — and reads an involuntary signal',1,'Exactly. Surprise/no-surprise is involuntary and hard to fake, unlike verbal predictions which are social performances.'],
['It commits you psychologically to finishing',0,'Commitment devices are a different tool. This one is purely diagnostic: extracting information System 1 already has.']]},
{q:'Your gut feels NO surprise at imagining your plan failing. The right response is:',opts:[
['Push the plan harder to prove your gut wrong',0,'The signal was information, not a challenge. Ignoring it repeats the exact mistake the technique exists to prevent.'],
['Treat it as data: ask what failure mode the simulator foresees, then patch the plan',1,'Right — and that question-asking loop has a name: Murphyjitsu (next chapter).'],
['Abandon the plan',0,'Too coarse. The simulator usually objects to a specific weak joint, not the whole plan. Find the joint.']]}],
cards:[
['What is the surprise-o-meter?','Vividly imagine the outcome as an already-happened fact and read the involuntary surprise/no-surprise. Unsurprised by failure = plan is fiction.'],
['Why query System 1 with scenes instead of questions?','The simulator’s native format is concrete scenes with dates and sensory detail; abstract "will it work?" gets hijacked by verbal hope.']],
},

{ id:'u8c2', icon:'🥋', title:'Murphyjitsu', kind:'drill',
teach:`<p><b>Murphyjitsu</b> = iterated pre-mortems powered by the surprise-o-meter:</p>
<p>1. Write your plan.<br>2. Simulate: "It failed." Surprised?<br>3. If not surprised: ask the simulator <i>how</i> it failed (the first image that comes is the data). Patch the plan against that specific failure.<br>4. Re-simulate. Repeat until imagined failure genuinely surprises you.</p>
<div class="key">Stop condition: <i>failure would surprise you</i>. Not "I added three safeguards" — surprise. That asymmetry is what makes it a feedback loop instead of a ritual.</div>
<p>Use it on real plans only: tomorrow's deadline, the weekend trip, the difficult email. A plan you will actually run is the only test bench that pushes back.</p>`,
drill:{prompt:`Run Murphyjitsu on a REAL plan from the next 7 days. Report: (a) the plan, (b) each simulated failure the simulator produced (at least 2 rounds), (c) the patch for each, (d) whether failure now genuinely surprises your gut — be honest if it does not.`,
placeholder:'Plan: ...\nRound 1 — gut says it fails by: ... → patch: ...\nRound 2 — ... → patch: ...\nFailure now surprising? ...',min:8},
rubric:['Plan is real and within ~7 days','At least 2 iterations of simulate→failure-mode→patch','Failure modes are specific scenes (who/what/when), not categories like "procrastination"','Honest final surprise reading; if still unsurprised, says so and names the residual hole'],
cards:[
['Murphyjitsu loop','Plan → imagine it failed → if unsurprised, ask HOW it failed → patch that specific mode → re-simulate. Stop when failure would genuinely surprise you.'],
['Murphyjitsu stop condition','Not "added enough safeguards" — imagined failure produces genuine gut surprise. Surprise is the metric, patches are the means.']],
},

{ id:'u8c3', icon:'⏱️', title:'Time calibration', kind:'checkin',
teach:`<p>The planning fallacy is the best-documented bias in the literature — and the most fixable, because feedback is cheap: <b>predict, then measure.</b></p>
<p>Standing practice: each day, before starting some real task, predict how many minutes it will take. When it is done, record the actual. Praxis keeps score and shows your personal <b>fudge ratio</b> (actual ÷ predicted). Most people start near 1.5-2×.</p>
<div class="key">After ~20 resolved predictions, you will know YOUR multiplier, per task type. From then on, "this will take an hour" comes with an automatic, evidence-based correction — calibration you can actually feel. (Hammertime Day 9.)</div>`,
checkin:{key:'timecal',label:'Time Prediction',icon:'⏱️',every:24,
ask:'Pick a real task you will do today. Predict its duration in minutes BEFORE starting. Resolve it (enter actual minutes) once done — open predictions wait in the Habits tab.',
form:'predict-min'},
cards:[
['How do you actually fix the planning fallacy?','Predict durations before real tasks, record actuals, learn your personal fudge ratio (actual ÷ predicted), then apply it to future estimates.']],
},
]},

{ id:'u9', icon:'🕯️', color:'var(--purple)', title:'Focusing', sub:'Listening to the wordless layer',
  source:[['Hammertime: Focusing','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/noXTkjP45BAZqKJxM'],['Book: Focusing (Gendlin)','https://www.rationality.org/resources/reading-list'],['Hammertime Day 6: Mantras','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/uhqax7dL8edMpqJWp']],
  chapters:[

{ id:'u9c1', icon:'🫧', title:'The felt sense', kind:'learn',
teach:`<p>Gendlin's <b>Focusing</b> begins from a research finding: therapy clients who improved were the ones who paused mid-sentence, attended to a vague bodily <i>something</i>, and let words come from it — rather than explaining themselves fluently.</p>
<p>That vague something is the <b>felt sense</b>: a pre-verbal, bodily sense of a whole situation. "Something about this project feels... [pause] ...crowded?" The word "crowded" either clicks — a small bodily release, the <b>felt shift</b> — or it does not, and you try another word.</p>
<h4>The loop</h4>
<p>1. Pick a situation; ask "what does ALL of that feel like?" and wait.<br>2. Let a fuzzy bodily quality form (chest, throat, gut — pressure, fog, knot).<br>3. Offer it words or images, gently, like guesses.<br>4. Check each guess against the body: click or no click.<br>5. On a click, ask the sense itself: "what makes it so [word]?" and wait again.</p>
<div class="key">Why this is in a rationality curriculum: enormous amounts of evidence about your real motivations and beliefs are stored sub-verbally. Focusing is the read-head for that data. Without it, Goal Factoring lists stay respectable and aversions stay unnamed.</div>`,
quiz:[
{q:'What distinguishes a felt sense from an emotion like "angry"?',opts:[
['A felt sense is stronger',0,'Usually the opposite — it is subtle, vague, easy to miss. Its signature is wholeness and pre-verbality, not intensity.'],
['A felt sense is a pre-verbal bodily sense of a WHOLE situation, initially without a name',1,'Yes. "Angry" is a labeled category; a felt sense is the unlabeled "something about all this" that words must be tested against.'],
['Felt senses are only found in meditation',0,'They arise in ordinary moments — mid-sentence, mid-decision. Focusing is noticing them, not inducing special states.']]},
{q:'How do you know a word you offered to the felt sense is RIGHT?',opts:[
['It sounds accurate when you say it',0,'Verbal plausibility is exactly what Focusing distrusts. The check is bodily, not rhetorical.'],
['A small bodily release or "click" — the felt shift',1,'Right. The body confirms or rejects the word. No click means keep guessing, even if the word is clever.'],
['It matches what you already believed about the situation',0,'Matching prior beliefs is a bug, not a test — the point is to learn something the verbal layer did not already know.']]}],
cards:[
['Felt sense — definition','A pre-verbal, bodily sense of a whole situation (pressure/fog/knot in chest, throat, gut) that precedes any label.'],
['Felt shift — what is it?','The small bodily release/"click" when an offered word or image fits the felt sense. It is the truth-test in Focusing.'],
['Why does a rationality curriculum include Focusing?','Much evidence about your real motivations/beliefs is stored sub-verbally. Focusing is the read-head; without it goal lists stay respectable and aversions unnamed.']],
},

{ id:'u9c2', icon:'🪞', title:'A focusing session', kind:'drill',
teach:`<p>Run one short session (10-15 min, somewhere quiet). Choose something mildly unresolved — a ledger bug with emotional residue works well. Not your heaviest material; pick a 4/10, not a 9/10.</p>
<div class="key">You will report on the PROCESS, not the content. The content is yours; whether you followed the loop is what feedback can help with.</div>`,
drill:{prompt:`Run a 10-15 min Focusing session on something mildly unresolved. Report the process: (a) what you picked and why it was mild enough, (b) where/how the felt sense showed up bodily, (c) 2-3 words/images you offered and how each checked out (click / no click), (d) any felt shift and what, if anything, surprised you. Content stays as private as you like — describe the mechanics.`,
placeholder:'Picked: ... (about 4/10 heavy)\nFelt sense: ... in my ...\nGuesses: "X" — no click; "Y" — partial; "Z" — click\nShift/surprise: ...',min:12},
rubric:['Chose appropriately mild material','Located a bodily felt sense and stayed with it (vs. analyzing verbally)','Tested multiple words/images against the body, reporting clicks honestly','Curious, non-coercive stance — no forcing meaning; surprise welcomed'],
cards:[],
},

{ id:'u9c3', icon:'📿', title:'Mantras', kind:'drill',
teach:`<p>Hammertime Day 6: a <b>mantra</b> is a short, self-authored sentence that re-aims your mind when a known failure mode fires. Not affirmations — <i>cached corrections</i>. Existing examples: "Is that your true rejection?", "What would I do if I were not afraid?", "The map is not the territory."</p>
<p>A good mantra: (a) targets a failure mode you actually have, (b) is phrased in words that move YOU (borrowed words decay fast), (c) is short enough to fire mid-moment, (d) pairs naturally with a noticing trigger — a mantra is the action half of a mental TAP.</p>
<div class="ex"><b>Example:</b> Failure mode: spiraling into thoroughness on low-stakes tasks. Mantra: "Done is a kind of perfect." Trigger: noticing the third revision pass.</div>`,
drill:{prompt:`Craft ONE mantra for a failure mode you have verified in yourself (ledger evidence welcome). Report: (a) the failure mode + evidence it recurs, (b) the mantra in your own words, (c) the noticing trigger it pairs with, (d) why these specific words move you where generic advice does not.`,
placeholder:'Failure mode: ... (seen on ... )\nMantra: "..."\nFires when I notice: ...\nWhy these words: ...',min:6},
rubric:['Failure mode is real and evidenced, not aspirational','Mantra is short, self-authored, and emotionally live for the author','Paired with a concrete noticing trigger (mental TAP structure)','Mantra is a correction/re-aim, not a feel-good affirmation'],
cards:[
['Mantra (Hammertime) — definition','A short self-authored sentence that re-aims your mind when a known failure mode fires: a cached correction, paired with a noticing trigger. Not an affirmation.']],
},
]},

{ id:'u10', icon:'🤝', color:'var(--teal)', title:'Internal Alignment', sub:'Stop fighting yourself',
  source:[['CFAR Handbook: Understanding Shoulds & IDC','https://www.rationality.org/resources/handbook'],['Hammertime: Internal Double Crux & TDT for Humans','https://www.lesswrong.com/s/qRxTKm7DAftSuTGvj/p/mQmx4kQQtHeBip9ZC']],
  chapters:[

{ id:'u10c1', icon:'⚖️', title:'Understanding shoulds', kind:'learn',
teach:`<p>CFAR's most quietly radical idea: when you feel "I should want to work but I want to rest," <b>both signals are coming from you</b>, and both encode real information about what you value.</p>
<p>The "should" usually carries social/long-term data (deadlines exist, people rely on you). The resistance usually carries local data (you are depleted, the task is misdesigned, the goal stopped being yours two years ago). Treating either side as the enemy throws away half your information.</p>
<div class="key">Diagnostic: a healthy goal feels like <i>wanting</i>, even when hard. A goal that runs purely on "should"-pressure for months is either someone else’s goal, or yours but misdesigned. Both are bugs — file them.</div>
<p>This reframe converts "I am lazy and broken" (unworkable) into "two subsystems disagree and each has evidence" (workable — by the next chapter).</p>`,
quiz:[
{q:'You have needed "discipline" to force a goal for six months straight. The CFAR-style diagnosis is:',opts:[
['You lack willpower; train harder',0,'Months of pure should-pressure is data about the goal, not about your character. Forcing harder discards that data.'],
['The resistance encodes information: the goal may be someone else’s, or yours but misdesigned — investigate, both options are bugs',1,'Right. Healthy goals mostly feel like wanting, even when hard. Chronic forcing means a subsystem is voting "no" for reasons worth hearing.'],
['Goals are not supposed to feel good; ignore the feeling',0,'Hard ≠ joyless-for-months. Persistent resistance is signal, and "ignore signal" is not a rationality technique.']]}],
cards:[
['What information does a "should" carry vs. the resistance to it?','Should: social/long-term data (commitments, consequences). Resistance: local data (depletion, misdesigned task, dead goal). Both are yours; both are evidence.'],
['Diagnostic for a goal running on pure should-pressure for months','Either someone else’s goal or yours-but-misdesigned. Both are bugs to file and factor — not character flaws to bulldoze.']],
},

{ id:'u10c2', icon:'🧬', title:'Internal Double Crux', kind:'drill',
teach:`<p><b>Internal Double Crux</b> stages a real negotiation between the conflicting parts:</p>
<p>1. Name the conflict ("ship it now" vs "it is not ready").<br>2. Let each side speak <b>in first person, fully, without interruption</b> — write both monologues. The side you like less goes second and gets MORE space.<br>3. Find each side's <b>crux</b>: what would change its mind? ("If I knew a delay would not slip forever, I would relax about shipping.")<br>4. Look for the experiment or reframe that satisfies both cruxes.<br>5. Close with a deal both sides actually accept — check for the felt shift from Unit 9; a deal without the click is a coup, and coups get reversed at 2am.</p>
<div class="key">The Focusing skill is load-bearing here: each "side" is often a felt sense first and an argument second. Let it speak from the body.</div>`,
drill:{prompt:`Run IDC on a real current internal conflict (a ledger bug with "I want X but also Y" structure). Report: (a) the two sides, (b) a few first-person lines from EACH (less-liked side gets more space), (c) each side’s crux, (d) the deal — and whether it produced a genuine click or just a verbal compromise.`,
placeholder:'Conflict: ...\nSide A says: "..."\nSide B says: "..."\nCrux A: ... / Crux B: ...\nDeal: ... Click? ...',min:12},
rubric:['Real, current conflict — not hypothetical','Both sides speak in first person; the disliked side gets genuine charity and space','Cruxes are actual mind-changers, specific and testable','Deal addresses both cruxes; honest report of click vs mere verbal truce'],
cards:[
['IDC — the five moves','Name conflict → each side speaks first-person (disliked side gets more space) → find each side’s crux → find experiment/reframe satisfying both → deal verified by felt shift.'],
['Why must an IDC deal produce a felt "click"?','A deal one side never accepted is a coup; the losing subsystem reverses it later (2am, week 3). The click is ratification.']],
},

{ id:'u10c3', icon:'🤞', title:'TDT for humans', kind:'learn',
teach:`<p>Hammertime's "TDT for Humans," humanized: you are not deciding <i>this case</i>; you are deciding <b>what kind of agent you are in all structurally similar cases</b>. Skipping today's run is not one skipped run — it is ratifying the policy "skip when tired," which future-you will execute hundreds of times.</p>
<p>Practical consequences:</p>
<p>• <b>Self-promises become precious.</b> Every kept promise to yourself raises the credibility of all future internal deals (including your IDC deals). Every broken one taxes them. So: promise rarely, keep ruthlessly.<br>• <b>Decide policies, not cases.</b> "Do I answer email at 22:30?" is exhausting nightly; "I do not answer email after 21:00" is decided once.<br>• <b>Design escape hatches in advance.</b> A policy with a principled exception ("unless someone is blocked on me") survives; a policy that meets reality unprepared dies, and its death taxes the next policy.</p>
<div class="key">Your relationship with future-you is iterated, not one-shot. Defect today, and tomorrow-you stops believing your commitments — at which point no technique in this app can be installed.</div>`,
quiz:[
{q:'Why does "promise rarely, keep ruthlessly" matter for everything else in this app?',opts:[
['Because broken self-promises feel bad',0,'The cost is structural, not just emotional: it is about the credibility of future internal contracts.'],
['Because TAPs, IDC deals, and policies are all promises to future-you — their installation depends on your internal credit rating',1,'Exactly. Each broken self-promise taxes every future internal deal. Self-trust is the currency the whole toolbox runs on.'],
['Because others are watching',0,'This is about the internal game; it binds even in perfect privacy.']]}],
cards:[
['"Deciding the policy, not the case" — what does it mean?','Each choice ratifies a rule for all structurally similar situations. Skipping a run when tired = installing "skip when tired" as policy.'],
['Why promise rarely and keep ruthlessly?','Every kept self-promise raises the credibility of future internal deals (TAPs, IDC, policies); every broken one taxes them. Self-trust is the installation medium.']],
},
]},
